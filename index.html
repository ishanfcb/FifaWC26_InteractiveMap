        // ── Gradient builder — smooth flag-colour ambient blend ──
        function buildFlagGradient(countryName) {
            const accentColor = (typeof FLAG_COLORS !== 'undefined' && FLAG_COLORS[countryName]) 
                ? FLAG_COLORS[countryName] 
                : '#1E5C46';
            return `linear-gradient(135deg, ${accentColor} 0%, #0A0E1F 100%)`;
        }
        function hexRgba(hex, a) {
            const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
            return `rgba(${r},${g},${b},${a})`;
        }
        function darkenHex(hex, t) {
            return '#' + [hex.slice(1,3),hex.slice(3,5),hex.slice(5,7)]
                .map(c => Math.round(parseInt(c,16)*(1-t)).toString(16).padStart(2,'0')).join('');
        }
        function fmtPop(n) {
            if (!n || n === 'null') return '—';
            // Assuming n is a pure integer representing headcount.
            if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
            if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
            return n.toLocaleString();
        }

        // ── DOM Timeline ──
        function renderInfoTimeline(entries, container, accentColor) {
            if (!entries || !entries.length) return;
            entries.forEach((entry, i) => {
                const card = el('div', 'ic-timeline-card');
                const yr = el('div', 'ic-timeline-year'); yr.textContent = entry.year;
                const ev = el('div', 'ic-timeline-event'); ev.textContent = entry.event;
                card.appendChild(yr); card.appendChild(ev);
                card.addEventListener('click', () => card.classList.toggle('expanded'));
                container.appendChild(card);
            });
        }

        // ── Drag-to-scroll (mouse + touch + inertia) ──
        function initDragScroll(el) {
            let down = false, startX, scrollLeft, velX = 0, lastX, raf;
            el.addEventListener('mousedown', e => {
                down = true; el.classList.add('dragging');
                startX = e.pageX - el.offsetLeft; scrollLeft = el.scrollLeft;
                lastX = e.pageX; velX = 0; cancelAnimationFrame(raf);
            });
            el.addEventListener('mouseleave', () => { down = false; el.classList.remove('dragging'); });
            el.addEventListener('mouseup', () => { down = false; el.classList.remove('dragging'); coast(el); });
            el.addEventListener('mousemove', e => {
                if (!down) return; e.preventDefault();
                const x = e.pageX - el.offsetLeft;
                velX = e.pageX - lastX; lastX = e.pageX;
                el.scrollLeft = scrollLeft - (x - startX) * 1.2;
            });
            el.addEventListener('touchstart', e => {
                startX = e.touches[0].pageX; scrollLeft = el.scrollLeft; velX = 0; lastX = startX;
                cancelAnimationFrame(raf);
            }, { passive: true });
            el.addEventListener('touchmove', e => {
                const x = e.touches[0].pageX;
                velX = x - lastX; lastX = x;
                el.scrollLeft = scrollLeft - (x - startX);
            }, { passive: true });
            el.addEventListener('touchend', () => coast(el));
            function coast(el) {
                cancelAnimationFrame(raf);
                (function step() {
                    if (Math.abs(velX) < 0.5) return;
                    el.scrollLeft -= velX; velX *= 0.92;
                    raf = requestAnimationFrame(step);
                })();
            }
        }

        // --- COUNTRY DETAIL RENDERING (RIGHT PANEL) ---
        function openCountryDetail(countryName, countryData) {
            const rightPanel = d3.select('#right-panel');
            const content = document.getElementById('country-detail-content');
            content.innerHTML = '';

            const iso = countryData.team.iso;
            const groupColor = (() => {
                for (const g of mockData.standings)
                    if (g.teams.some(t => t.name === countryName)) return g.color;
                return '#888';
            })();
            const ed = getEditorial(countryName, iso);

            // ── Header ──
            const header = el('div', 'ic-header');
            const gradBg = el('div', 'ic-header-gradient');
            gradBg.style.background = buildFlagGradient(countryName);
            header.appendChild(gradBg);

            const flagBox = el('div', 'ic-flag-box');
            const flagImg = el('img');
            flagImg.src = `https://flagcdn.com/w320/${getAlpha2(iso)}.png`;
            flagImg.alt = countryName;
            flagBox.appendChild(flagImg);
            header.appendChild(flagBox);

            const textBlock = el('div', 'ic-header-text');
            const groupLbl = el('div', 'ic-group-label'); groupLbl.textContent = countryData.groupName.toUpperCase();
            const nameEl = el('div', 'ic-country-name'); nameEl.textContent = countryName;
            
            textBlock.appendChild(groupLbl);
            textBlock.appendChild(nameEl);
            header.appendChild(textBlock);
            content.appendChild(header);

            // ── Stat strip ──
            const statsRow = el('div', 'ic-stats');
            statsRow.appendChild(makeTile('Population', ed.population ? fmtPop(ed.population) : null, ''));
            let rankStr = null;
            if (ed.fifaRank !== null && ed.fifaRank !== undefined && ed.fifaRank !== 'null') {
                const parsedRank = parseInt(ed.fifaRank, 10);
                if (parsedRank > 300 || !isFinite(parsedRank) || isNaN(parsedRank)) {
                    console.warn(`Invalid FIFA rank for ${countryName}:`, ed.fifaRank);
                    rankStr = '—';
                } else {
                    rankStr = `#${Math.round(parsedRank)}`;
                }
            }
            statsRow.appendChild(makeTile('FIFA Rank', rankStr, ''));
            statsRow.appendChild(makeTile('WC Won', ed.wcWon !== null ? ed.wcWon : null, ''));
            statsRow.appendChild(makeFormTile(ed.form));
            content.appendChild(statsRow);

            // ── Body ──
            const body = el('div', 'ic-body');

            body.appendChild(divider());
            const ovHead = el('div', 'ic-section-heading'); ovHead.textContent = 'Footballing Overview';
            const ovText = el('p', 'ic-overview'); 
            ovText.textContent = ed.overview && ed.overview.trim() ? ed.overview : 'Overview coming soon.';
            body.appendChild(ovHead); body.appendChild(ovText);

            body.appendChild(divider());
            const tlPanel = el('div', 'ic-timeline-panel');
            const tlTitle = el('div', 'ic-timeline-title'); tlTitle.textContent = 'Timeline';
            const tlScroll = el('div', 'ic-timeline-scroll');
            tlPanel.appendChild(tlTitle); tlPanel.appendChild(tlScroll);
            body.appendChild(tlPanel);

            body.appendChild(divider());
            const plSec = el('div', 'ic-players');
            const plHead = el('div', 'ic-section-heading'); plHead.textContent = 'Players to Watch';
            const plList = el('div', 'ic-player-list');
            ed.players.forEach(p => {
                const item = el('div', 'ic-player-item');
                const avatar = el('div', 'ic-player-avatar');
                const initials = p.name.split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase();
                avatar.textContent = initials;
                
                const info = el('div', 'ic-player-info');
                const pName = el('div', 'ic-player-name'); pName.textContent = p.name;
                const pClub = el('div', 'ic-player-club'); pClub.textContent = p.club;
                
                info.appendChild(pName); info.appendChild(pClub);
                item.appendChild(avatar); item.appendChild(info);
                plList.appendChild(item);
            });
            plSec.appendChild(plHead); plSec.appendChild(plList);
            body.appendChild(plSec);

            content.appendChild(body);
            rightPanel.classed('open', true);

            // Build timeline after DOM is in place
            requestAnimationFrame(() => {
                renderInfoTimeline(ed.timeline, tlScroll, groupColor);
                initDragScroll(tlScroll);
            });
        }

        // ── tiny DOM helpers ──
        function el(tag, cls) {
            const e = document.createElement(tag);
            if (cls) e.className = cls;
            return e;
        }
        function makeTile(label, value, extraCls='') {
            const t = el('div', 'ic-tile');
            if (value === null) {
                t.innerHTML = `<div class="ic-tile-value ${extraCls}"><span class="ic-skeleton">...</span></div><div class="ic-tile-label">${label}</div>`;
            } else {
                t.innerHTML = `<div class="ic-tile-value ${extraCls}">${value}</div><div class="ic-tile-label">${label}</div>`;
            }
            return t;
        }
        function makeFormTile(form) {
            const t = el('div', 'ic-tile');
            const val = el('div', 'ic-tile-value');
            if (!form || !form.length) {
                val.innerHTML = '<span class="ic-skeleton">...</span>';
            } else {
                const dots = el('div', 'ic-form-dots');
                form.forEach(m => {
                    const dot = el('div', `ic-form-dot ${m.result==='W'?'win':m.result==='L'?'loss':'draw'}`);
                    dots.appendChild(dot);
                });
                val.appendChild(dots);
            }
            const lbl = el('div', 'ic-tile-label'); lbl.textContent = 'Form';
            t.appendChild(val); t.appendChild(lbl);
            return t;
        }
        function divider() {
            return el('div', 'ic-divider');
        }

                const teamRank = group.teams.findIndex(t =>

// ============================================================
// TIMELINE FUNCTIONS  — horizontal scrolling, alternating above/below
// ============================================================

let _tlInitDone = false;

function getCountryGroupMatches(countryName) {
    const list = [];
    if (!mockData.allGames || !Array.isArray(mockData.allGames)) return list;
    
    const norm = (c) => {
        const map = {
            'South Korea': 'Korea Republic', 'Czech Republic': 'Czechia',
            'United States': 'USA', 'USA': 'USA', 'Bosnia & Herzegovina': 'Bosnia and Herzegovina',
            'Ivory Coast': "Côte d'Ivoire", 'Turkey': 'Türkiye',
            'DR Congo': 'Congo DR', 'Iran': 'Iran', 'Cape Verde': 'Cabo Verde'
        };
        return map[c] || c;
    };
    const targetNorm = norm(countryName);
    
    mockData.allGames.forEach(g => {
        let hRaw = g.home_team_name_en || g.team1;
        let aRaw = g.away_team_name_en || g.team2;
        if (!hRaw || !aRaw) return;
        
        let hName = norm(DISPLAY_NAME_OVERRIDES[hRaw] || hRaw);
        let aName = norm(DISPLAY_NAME_OVERRIDES[aRaw] || aRaw);
        
        const isGroup = (g.type && g.type.toLowerCase() === 'group') || 
                        (g.group && g.group.toLowerCase().includes('group')) ||
                        (g.round && g.round.toLowerCase().includes('group'));
                        
        if (isGroup && (hName === targetNorm || aName === targetNorm)) {
            let hScoreStr = '–';
            let aScoreStr = '–';
            let finished = false;
            
            if (g.finished === 'TRUE' || g.time_elapsed === 'finished') {
                finished = true;
                hScoreStr = String(g.home_score !== undefined && g.home_score !== null ? g.home_score : '');
                aScoreStr = String(g.away_score !== undefined && g.away_score !== null ? g.away_score : '');
            } else if (g.score && g.score.ft) {
                finished = true;
                hScoreStr = String(g.score.ft[0]);
                aScoreStr = String(g.score.ft[1]);
            }
            
            const hScoreVal = parseInt(hScoreStr, 10);
            const aScoreVal = parseInt(aScoreStr, 10);
            
            const hWins = finished && hScoreVal > aScoreVal;
            const aWins = finished && aScoreVal > hScoreVal;
            
            const matchObj = {
                finished,
                home: {
                    name: hName,
                    flagUrl: flagUrl(hName),
                    scoreStr: hScoreStr,
                    isWinner: hWins,
                    eliminated: finished && !hWins && hScoreVal !== aScoreVal
                },
                away: {
                    name: aName,
                    flagUrl: flagUrl(aName),
                    scoreStr: aScoreStr,
                    isWinner: aWins,
                    eliminated: finished && !aWins && hScoreVal !== aScoreVal
                }
            };
            list.push(matchObj);
        }
    });
    return list;
}

function renderMiniFixtures(countryName) {
    const container = document.getElementById('left-fixtures-container');
    if (!container) return;
    container.innerHTML = '';
    
    let hasFixtures = false;
    
    // 1. Group Stage Matches
    const groupMatches = getCountryGroupMatches(countryName);
    groupMatches.forEach(match => {
        hasFixtures = true;
        const item = document.createElement('div');
        item.className = 'tl-fixture-item';
        
        const label = document.createElement('div');
        label.className = 'tl-fixture-round';
        label.textContent = 'Group Stage';
        
        const card = document.createElement('div');
        card.className = 'tl-fixture-card';
        
        const renderTeam = (side) => {
            const isWinner = side.isWinner;
            const isEliminated = side.eliminated;
            const cls = isWinner ? 'winner' : (isEliminated ? 'loser' : 'pending');
            const flag = side.flagUrl ? `<img class="tl-fixture-flag" src="${side.flagUrl}" alt="">` : `<span class="tl-fixture-flag-placeholder">?</span>`;
            const score = match.finished ? side.scoreStr : '–';
            
            return `<div class="tl-fixture-team ${cls}">
                ${flag}
                <span class="tl-fixture-name">${side.name || 'TBD'}</span>
                <span class="tl-fixture-score">${score}</span>
            </div>`;
        };
        
        card.innerHTML = `
            ${renderTeam(match.home)}
            <div class="tl-fixture-divider"></div>
            ${renderTeam(match.away)}
        `;
        
        item.appendChild(label);
        item.appendChild(card);
        container.appendChild(item);
    });
    
    // 2. Knockout Matches
    const rounds = ['r32', 'r16', 'qf', 'sf', 'final'];
    const roundLabels = { r32: 'Round of 32', r16: 'Round of 16', qf: 'Quarters', sf: 'Semis', final: 'Final' };
    
    rounds.forEach(round => {
        const matches = (mockData.knockoutMatches && mockData.knockoutMatches[round]) || [];
        const match = matches.find(m => 
            (m.home && m.home.name === countryName) || 
            (m.away && m.away.name === countryName)
        );
        
        if (match) {
            hasFixtures = true;
            
            const item = document.createElement('div');
            item.className = 'tl-fixture-item';
            
            const label = document.createElement('div');
            label.className = 'tl-fixture-round';
            label.textContent = roundLabels[round];
            
            const card = document.createElement('div');
            card.className = 'tl-fixture-card';
            
            const renderTeam = (side) => {
                const isWinner = side.isWinner;
                const isEliminated = side.eliminated;
                const cls = isWinner ? 'winner' : (isEliminated ? 'loser' : 'pending');
                const flag = side.flagUrl ? `<img class="tl-fixture-flag" src="${side.flagUrl}" alt="">` : `<span class="tl-fixture-flag-placeholder">?</span>`;
                const score = match.finished ? side.scoreStr : '–';
                
                return `<div class="tl-fixture-team ${cls}">
                    ${flag}
                    <span class="tl-fixture-name">${side.name || side.label || 'TBD'}</span>
                    <span class="tl-fixture-score">${score}</span>
                </div>`;
            };
            
            card.innerHTML = `
                ${renderTeam(match.home)}
                <div class="tl-fixture-divider"></div>
                ${renderTeam(match.away)}
            `;
            
            item.appendChild(label);
            item.appendChild(card);
            container.appendChild(item);
        }
    });
    
    if (hasFixtures) {
        container.style.display = 'grid';
    } else {
        container.style.display = 'none';
    }
}

function openTimeline(countryName) {
  if (typeof applySelectionDimming === 'function') applySelectionDimming(countryName);
  
  // Show backdrop
  const backdrop = document.getElementById('timeline-backdrop');
  if (backdrop) backdrop.classList.add('open');

  // Bring map to top
  const canvas = d3.select(".main-canvas");
  if (canvas) canvas.classed("map-on-top", true);

  const panel     = document.getElementById('timeline-panel');
  const flagEl    = document.getElementById('tl-flag');
  const countryEl = document.getElementById('tl-country');
  const track     = document.getElementById('tl-track');

  // Header
  countryEl.textContent = countryName;
  const url = flagUrl(countryName);
  flagEl.src = url || '';
  flagEl.alt = countryName;

  // Render mini fixtures
  renderMiniFixtures(countryName);

  // Get timeline entries — prefer TIMELINE_DATA (richer), fallback to editorial
  const entries = (typeof TIMELINE_DATA !== 'undefined' && TIMELINE_DATA[countryName])
    ? TIMELINE_DATA[countryName].map(e => ({ year: e.year || '', text: e.text || '' }))
    : [];

  // Build horizontal nodes
  track.innerHTML = '';
  entries.forEach((e, i) => {
    const isAbove = (i % 2 === 0);
    const node = document.createElement('div');
    node.className = 'tl-node ' + (isAbove ? 'tl-above' : 'tl-below');

    const textBlock = document.createElement('div');
    textBlock.className = 'tl-text-block';

    const yearEl = document.createElement('div');
    yearEl.className = 'tl-year';
    yearEl.textContent = e.year;

    const descEl = document.createElement('div');
    descEl.className = 'tl-desc';
    descEl.textContent = e.text;  // textContent avoids HTML injection

    textBlock.appendChild(yearEl);
    textBlock.appendChild(descEl);

    const stem = document.createElement('div');
    stem.className = 'tl-stem';

    const dot = document.createElement('div');
    dot.className = 'tl-dot';

    node.appendChild(textBlock);
    node.appendChild(stem);
    node.appendChild(dot);
    track.appendChild(node);
  });

  // Show panel
  panel.classList.add('open');

  // Scroll to start
  const wrapper = panel.querySelector('.tl-scroll-wrapper');
  if (wrapper) wrapper.scrollLeft = 0;

  if (!_tlInitDone) {
    _tlInitDone = true;
    _tlSetupInteractions();
  }
}

function closeTimeline() {
  if (typeof applySelectionDimming === 'function') applySelectionDimming(null);
  
  // Hide backdrop
  const backdrop = document.getElementById('timeline-backdrop');
  if (backdrop) backdrop.classList.remove('open');

  // Remove map from top
  const canvas = d3.select(".main-canvas");
  if (canvas) canvas.classed("map-on-top", false);

  // Hide left fixtures container
  const leftFixtures = document.getElementById('left-fixtures-container');
  if (leftFixtures) {
    leftFixtures.style.display = 'none';
    leftFixtures.innerHTML = '';
  }

  const panel = document.getElementById('timeline-panel');
  if (panel) panel.classList.remove('open');
}

function _tlSetupInteractions() {
  const closeBtn = document.getElementById('tl-close');
  closeBtn.addEventListener('click', () => {
    closeTimeline();
    if (typeof clearSelections === 'function') clearSelections();
  });

  const backdrop = document.getElementById('timeline-backdrop');
  if (backdrop) {
    backdrop.addEventListener('click', () => {
      closeTimeline();
      if (typeof clearSelections === 'function') clearSelections();
    });
  }

  window.addEventListener('keydown', (e) => {
    const panel = document.getElementById('timeline-panel');
    if (!panel || !panel.classList.contains('open')) return;
    if (e.key === 'Escape') { closeTimeline(); if (typeof clearSelections === 'function') clearSelections(); }
    // Arrow keys scroll the horizontal track
    const wrapper = panel.querySelector('.tl-scroll-wrapper');
    if (!wrapper) return;
    if (e.key === 'ArrowRight') { e.preventDefault(); wrapper.scrollBy({ left: 180, behavior: 'smooth' }); }
    if (e.key === 'ArrowLeft')  { e.preventDefault(); wrapper.scrollBy({ left: -180, behavior: 'smooth' }); }
  });
}

</script>

<div id="timeline-backdrop" class="timeline-backdrop"></div>
<div id="left-fixtures-container" class="left-fixtures-container"></div>
<div id="timeline-panel" class="timeline-panel">
  <div class="tl-header">
    <img id="tl-flag" class="tl-flag" src="" alt="" />
    <span id="tl-country" class="tl-country"></span>
    <button id="tl-close" class="tl-close">✕</button>
  </div>
  <div class="tl-scroll-wrapper">
    <div id="tl-track" class="tl-track">
      <!-- Nodes injected by openTimeline() -->
    </div>
  </div>
</div>
