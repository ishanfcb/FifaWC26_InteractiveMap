<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026 - World Map</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
    <!-- Fonts for country card -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Koulen&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0A0E1F;
            --map-country: #1C2340;
            --map-ocean: #080C1A;
            --map-border: rgba(255,255,255,0.08);
            --frosted-bg: rgba(255,255,255,0.06);
            --frosted-border: 1px solid rgba(255,255,255,0.1);
            --card-border: rgba(255,255,255,0.06);
            --ios-blue: #007AFF;
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255,255,255,0.55);
            
            --header-bg: rgba(28, 35, 64, 0.75);
            --pill-slider-bg: #FFFFFF;
            --pill-selected-text: #0A0E1F;
            
            --country-hover: #2A3560;
            --country-part: #3A4B86;
            --country-part-hover: #4D62B3;
            --country-part-stroke: rgba(0, 122, 255, 0.4);
            
            --group-card-bg: rgba(255,255,255,0.03);
            --row-hover: rgba(255,255,255,0.05);
            --label-fill: rgba(255,255,255,0.4);
            
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-display: 'Koulen', 'Impact', 'Arial Narrow', sans-serif;
            --font-body: 'Outfit', -apple-system, sans-serif;
            --transition-speed: 0.2s;
            --ease-cubic: cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.theme-light {
            /* Light blue ocean, cream countries, soft blue participating */
            --bg-color: #CBDCEB;
            --map-country: #F5EFE6;
            --map-ocean: #CBDCEB;
            --map-border: rgba(0,0,0,0.08);
            --frosted-bg: rgba(245, 239, 230, 0.8);
            --frosted-border: 1px solid rgba(0,0,0,0.1);
            --card-border: rgba(0,0,0,0.08);
            --text-primary: #1A1A1A;
            --text-secondary: rgba(0,0,0,0.6);
            
            --header-bg: rgba(245, 239, 230, 0.85);
            --pill-slider-bg: #6D94C5;
            --pill-selected-text: #FFFFFF;
            
            --country-hover: #FFFFFF;
            --country-part: #6D94C5;
            --country-part-hover: #5B81B3;
            --country-part-stroke: rgba(0, 0, 0, 0.1);
            
            --group-card-bg: rgba(0,0,0,0.04);
            --row-hover: rgba(0,0,0,0.06);
            --label-fill: rgba(0,0,0,0.5);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            font-size: 14px;
            transition: background-color 0.3s var(--ease-cubic), color 0.3s var(--ease-cubic);
        }

        /* TOP CONTROLS */
        .top-left-controls {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 1000;
        }

        .top-right-controls {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 1000;
        }

        .pill-tab-control {
            display: flex;
            background-color: var(--header-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: var(--frosted-border);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
            border-radius: 20px;
            height: 36px;
            align-items: center;
            position: relative;
            padding: 2px;
            box-sizing: border-box;
            transition: background-color 0.3s var(--ease-cubic), border-color 0.3s var(--ease-cubic);
        }

        .slider-bg {
            position: absolute;
            top: 2px;
            left: 0; 
            height: calc(100% - 4px);
            background-color: var(--pill-slider-bg);
            border-radius: 16px;
            z-index: 1;
            transition: background-color 0.3s var(--ease-cubic);
        }

        .pill-tab {
            padding: 0 16px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            cursor: pointer;
            transition: color var(--transition-speed);
            position: relative;
            z-index: 2;
            font-weight: 500;
        }

        .pill-tab.selected {
            color: var(--pill-selected-text);
            font-weight: 600;
        }

        /* BOTTOM DOCK (STANDINGS) */
        .bottom-dock {
            position: absolute;
            inset: 0;
            background: var(--frosted-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: var(--frosted-border);
            border-radius: 24px;
            pointer-events: auto;
            overflow-x: auto;
            overflow-y: hidden;
            -ms-overflow-style: none;
            scrollbar-width: none;
            transition: background-color 0.3s var(--ease-cubic), border-color 0.3s var(--ease-cubic);
        }

        .bottom-dock::-webkit-scrollbar {
            display: none;
        }

        .dock-content {
            display: flex;
            height: 100%;
            padding: 16px 20px;
            gap: 16px;
            box-sizing: border-box;
            align-items: center;
        }

        .group-card {
            flex: 0 0 380px;
            background-color: var(--group-card-bg);
            background-image: linear-gradient(135deg, var(--card-tint-start, transparent) 0%, var(--card-tint-end, transparent) 100%);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 24px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: background-color 0.3s var(--ease-cubic), border-color 0.3s var(--ease-cubic);
            overflow: hidden; 
            transform: translateZ(0); /* Strict clip hack to prevent color leaking outside border-radius */
        }

        .group-header-inline {
            font-weight: 600;
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: left !important;
        }

        .table-row {
            display: grid;
            grid-template-columns: 28px 1fr 28px 28px 28px 28px 32px 32px;
            align-items: center;
            height: 32px;
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.1s;
            column-gap: 4px;
        }

        .table-row.no-hover {
            cursor: default;
            margin-bottom: 12px;
            height: auto;
        }

        .table-row:not(.no-hover):hover {
            background-color: var(--row-hover);
        }

        .table-row.highlight {
            background-color: rgba(0, 122, 255, 0.15);
        }

        .table-row span {
            text-align: center;
        }

        .country-flag-circle {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #222; 
            margin: 0 auto;
        }

        .country-flag-emoji {
            font-size: 16px;
        }

        .country-name-cell {
            text-align: left !important;
            padding-left: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 15px;
            font-weight: 500;
        }

        .header-cell {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-secondary);
            text-align: center !important;
        }

        .stat-cell, .gd-cell {
            font-size: 14px;
            font-weight: 500;
            text-align: center !important;
        }

        .pts-cell {
            color: var(--text-primary);
            font-weight: 700;
            font-size: 14px;
            text-align: center !important;
        }

        /* MAIN CANVAS & MAP */
        .main-canvas {
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 100;
            background-color: var(--map-ocean);
            transition: background-color 0.3s var(--ease-cubic);
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .country {
            fill: var(--map-country);
            stroke: var(--map-border);
            stroke-width: 0.5px;
            cursor: pointer;
            transition: fill 0.3s var(--ease-cubic), filter 0.2s var(--ease-cubic), stroke 0.3s var(--ease-cubic);
        }

        .country:hover {
            fill: var(--country-hover);
        }

        /* Visual Distinction for Participating Countries */
        body.view-qualified .country.participating {
            fill: var(--country-part); 
            stroke: var(--country-part-stroke);
        }

        body.view-qualified .country.participating:hover {
            fill: var(--country-part-hover);
        }

        /* Active State always uses iOS blue, regardless of view mode */
        .country.active, .country.participating.active {
            fill: var(--ios-blue) !important;
            filter: drop-shadow(0 0 15px rgba(0, 122, 255, 0.8));
            stroke: none !important;
        }

        .map-has-selection .country:not(.active) {
            filter: blur(4px);
            opacity: 0.5;
        }

        /* COUNTRY LABELS */
        .country-label {
            font-family: var(--font-family);
            font-size: 12px;
            fill: var(--label-fill);
            text-anchor: middle;
            dominant-baseline: middle;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s var(--ease-cubic), fill 0.3s var(--ease-cubic);
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* TOOLTIP */
        .tooltip {
            position: absolute;
            background: var(--frosted-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: var(--frosted-border);
            padding: 8px 12px;
            border-radius: 8px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s var(--ease-cubic), background-color 0.3s var(--ease-cubic), border-color 0.3s var(--ease-cubic);
            z-index: 1100;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* APPLE STYLE SIDE PANEL */
        .right-side-panel {
            position: fixed;
            right: -500px;
            top: 88px;
            width: min(460px, calc(100vw - 32px));
            background: #FFFFFF;
            border-radius: 32px;
            z-index: 1200;
            transition: right .4s cubic-bezier(.4,0,.2,1);
            max-height: calc(100vh - 130px);
            overflow-y: auto;
            -ms-overflow-style: none;
            scrollbar-width: none;
            box-shadow: 0 24px 80px rgba(0,0,0,0.55);
            color: #000;
        }
        .right-side-panel::-webkit-scrollbar { display: none; }
        .right-side-panel.open { right: 24px; }

        /* ── INFO CARD STYLES ─────────────────────────────────────────── */
        .right-panel-content { padding: 0; }

        /* Header */
        .ic-header {
            position: relative;
            min-height: 130px;
            display: flex;
            align-items: flex-end;
            padding: 22px 22px 18px;
            overflow: hidden;
            border-radius: 24px 24px 0 0;
        }
        .ic-header-gradient {
            position: absolute; inset: 0; z-index: 0;
            height: 200px;
        }
        .ic-header-text { position: relative; z-index: 2; flex: 1; min-width: 0; }
        .ic-country-name {
            font-family: var(--font-display);
            font-size: 56px;
            font-weight: 400;
            line-height: 1;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #000;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: inline-block;
        }
        .ic-subtitle {
            display: inline-flex; align-items: center; gap: 6px; margin-left: 12px;
            vertical-align: super; position: relative; top: -14px;
        }
        .ic-subtitle-dot {
            width: 4px; height: 4px; border-radius: 50%;
            background: #000; flex-shrink: 0;
        }
        .ic-subtitle-text {
            font-family: var(--font-display);
            font-size: 14px; font-weight: 400;
            letter-spacing: 1.5px; text-transform: uppercase;
            color: #000;
        }
        .ic-flag-box {
            position: absolute; top: 38px; right: 28px; z-index: 2;
            width: 72px; height: 46px; border-radius: 6px; overflow: hidden;
            background: #000;
            display: flex; align-items: center; justify-content: center;
        }
        .ic-flag-box img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* Group tag */
        .ic-group-tag { padding: 0 22px 0; position: relative; z-index: 2; margin-top: -4px; }
        .ic-group-pill {
            display: inline-flex; align-items: center;
        }
        .ic-group-dot { display: none; }
        .ic-group-text {
            font-family: var(--font-display);
            font-size: 18px; font-weight: 400;
            letter-spacing: 1px; text-transform: uppercase;
            color: #000;
        }

        /* Stat tiles */
        /* Stat tiles */
        .ic-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1.5fr;
            gap: 8px; padding: 16px 22px 16px;
        }
        .ic-tile {
            background: #000;
            border-radius: 8px;
            padding: 12px 0 10px;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .ic-tile-label {
            font-family: var(--font-display);
            font-size: 14px; font-weight: 400;
            letter-spacing: 1px; text-transform: uppercase;
            color: #fff;
        }
        .ic-tile-value {
            font-family: var(--font-display);
            font-size: 32px; font-weight: 400;
            line-height: 1; color: #fff; letter-spacing: 1px;
        }
        .ic-tile-value.sm { font-size: 20px; margin-top: 6px; }
        .ic-form-results { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 3px; }
        .ic-form-match { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .ic-opp-flag {
            width: 22px; height: 22px; border-radius: 50%; overflow: hidden;
            position: relative;
            flex-shrink: 0;
        }
        .ic-opp-flag img { width: 100%; height: 100%; object-fit: cover; }
        .ic-result-badge {
            width: 14px; height: 14px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-body);
            font-size: 9px; font-weight: 700;
            color: #fff;
            margin-top: -8px; z-index: 2; border: 2px solid #000;
        }
        .ic-result-badge.win  { background: #30d158; }
        .ic-result-badge.loss { background: #ff453a; }
        .ic-result-badge.draw { background: #8e8e93; }

        /* Body */
        .ic-body { padding: 4px 22px 22px; }
        .ic-divider { height: 1px; background: #E5E5EA; margin: 0 -22px 16px; }
        .ic-section-heading {
            font-family: var(--font-display);
            font-size: 20px; font-weight: 400;
            letter-spacing: 1px; text-transform: uppercase;
            color: #000; margin-bottom: 8px;
        }
        .ic-overview {
            font-family: var(--font-body);
            font-size: 11px; line-height: 1.5; font-weight: 500;
            color: #000; margin-bottom: 24px;
        }

        /* Timeline */
        .ic-timeline-panel {
            background: #000;
            border-radius: 16px;
            padding: 16px 0 14px;
            margin-bottom: 24px; overflow: hidden;
        }
        .ic-timeline-title {
            font-family: var(--font-display);
            font-size: 20px; font-weight: 400;
            letter-spacing: 1px; text-transform: uppercase;
            color: #fff;
            padding: 0 18px 12px;
        }
        .ic-timeline-scroll {
            overflow-x: auto; overflow-y: visible;
            cursor: grab; -ms-overflow-style: none; scrollbar-width: none;
            padding: 0 18px 6px;
        }
        .ic-timeline-scroll::-webkit-scrollbar { display: none; }
        .ic-timeline-scroll.dragging { cursor: grabbing; }

        /* Players */
        .ic-players { margin-bottom: 0; }
        .ic-player-list { list-style: disc; display: flex; flex-direction: column; gap: 4px; padding-left: 20px; margin: 0; }
        .ic-player-item {
            display: list-item;
            font-family: var(--font-body);
            font-size: 11px; color: #000; font-weight: 600;
        }
        .ic-player-dot { display: none; }
        .ic-player-name { font-weight: 600; color: #000; }
        .ic-player-sep { color: #000; margin: 0 4px; }
        .ic-player-club { font-weight: 600; color: #000; }

        /* kept for backwards compat — no longer rendered */
        .next-match-card, .match-details, .opponent-row, .opponent-name, .match-time, .chevron { display: none; }

        /* CAROUSEL ARROWS */
        .bottom-dock-wrapper {
            position: fixed;
            bottom: 24px;
            left: 24px;
            right: 24px;
            height: 240px;
            z-index: 900;
            pointer-events: none; /* Let clicks pass through except on buttons/dock */
        }
        
        .carousel-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            background: var(--header-bg);
            border: var(--frosted-border);
            color: var(--text-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 910;
            backdrop-filter: blur(10px);
            pointer-events: auto;
            transition: background 0.2s, transform 0.2s;
        }

        .carousel-arrow:hover {
            background: var(--country-hover);
            transform: translateY(-50%) scale(1.05);
        }

        .carousel-arrow:active {
            transform: translateY(-50%) scale(0.95);
        }

        .carousel-arrow.left { left: -20px; }
        .carousel-arrow.right { right: -20px; }

        /* RECTANGULAR FLAGS */
        .flag-rect {
            width: 24px;
            height: 16px;
            border-radius: 3px;
            object-fit: cover;
            display: block;
            margin: 0 auto;
        }

        /* editorial styles replaced by ic-* above */

        /* LIVE INDICATOR */
        #live-indicator {
            position: fixed;
            bottom: 280px;
            right: 24px;
            z-index: 1100;
            display: flex;
            align-items: center;
            gap: 7px;
            background: var(--frosted-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: var(--frosted-border);
            border-radius: 20px;
            padding: 5px 12px 5px 9px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.4px;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.4s ease, transform 0.4s ease;
            pointer-events: none;
        }
        #live-indicator.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff3b30;
            animation: livePulse 1.4s ease-in-out infinite;
            flex-shrink: 0;
        }
        @keyframes livePulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.7); }
        }
        .data-freshness-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            flex-shrink: 0;
        }

    </style>
</head>
<body class="view-qualified theme-night">

    <div class="top-left-controls">
        <!-- View Mode Toggle -->
        <div class="pill-tab-control" id="view-pill-control">
            <div class="slider-bg" id="view-pill-slider"></div>
            <div class="pill-tab">Default</div>
            <div class="pill-tab selected">Qualified</div>
        </div>
    </div>
        
    <div class="top-right-controls">
        <!-- Theme Toggle -->
        <div class="pill-tab-control" id="theme-pill-control">
            <div class="slider-bg" id="theme-pill-slider"></div>
            <div class="pill-tab selected">Night</div>
            <div class="pill-tab">Light</div>
        </div>
    </div>

    <div class="main-canvas" id="map-canvas">
        <div class="tooltip" id="map-tooltip"></div>
    </div>

    <!-- Bottom Dock -->
    <div class="bottom-dock-wrapper">
        <button id="scroll-left" class="carousel-arrow left">‹</button>
        <div class="bottom-dock" id="bottom-dock">
            <div class="dock-content" id="standings-content"></div>
        </div>
        <button id="scroll-right" class="carousel-arrow right">›</button>
    </div>

    <div class="right-side-panel" id="right-panel">
        <div class="right-panel-content" id="country-detail-content"></div>
    </div>

    <div id="live-indicator">
        <span class="live-dot"></span>
        <span>Live</span>
    </div>

    <script>
        // --- Segmented Control Animation & Mode Toggling Setup ---
        function initPillControl(containerId, callback) {
            const container = document.getElementById(containerId);
            if (!container) return;
            const tabs = container.querySelectorAll(".pill-tab");
            const slider = container.querySelector(".slider-bg");

            function updateSlider(tab) {
                slider.style.width = tab.offsetWidth + "px";
                slider.style.transform = `translateX(${tab.offsetLeft}px)`;
            }

            // Init position instantly to avoid snapping on load
            const activeTab = container.querySelector(".pill-tab.selected");
            if (activeTab) {
                slider.style.transition = 'none';
                updateSlider(activeTab);
                
                // Force a reflow so the instant position is rendered before transitions are applied
                void slider.offsetWidth; 
                
                slider.style.transition = 'transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
                
                if (callback) callback(activeTab.textContent.trim());
            }

            tabs.forEach(tab => {
                tab.addEventListener("click", function() {
                    // Update Active Styles
                    tabs.forEach(t => t.classList.remove("selected"));
                    this.classList.add("selected");
                    updateSlider(this);

                    if (callback) callback(this.textContent.trim());
                });
            });
        }
        
        // Initialize View Control
        initPillControl("view-pill-control", (selectedText) => {
            if (selectedText === "Qualified") {
                document.body.classList.add("view-qualified");
            } else {
                document.body.classList.remove("view-qualified");
            }
        });

        // Initialize Theme Control
        initPillControl("theme-pill-control", (selectedText) => {

        // ============================================================
        //  LIVE DATA SERVICE
        // ============================================================
        const LiveDataService = {
            PRIMARY: 'http://worldcup26.ir:3050',
            FALLBACK: 'https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json',
            REFRESH_INTERVAL_MS: 10 * 60 * 1000,  // 10 minutes
            LIVE_POLL_MS: 60 * 1000,               // 60 seconds during live matches
            jwtToken: null,
            refreshTimer: null,
            isLive: false,

            // ── Fetch wrapper with timeout + optional JWT ──
            async fetchAPI(endpoint, retried = false) {
                const controller = new AbortController();
                const tid = setTimeout(() => controller.abort(), 8000);
                try {
                    const headers = {};
                    if (this.jwtToken) headers['Authorization'] = `Bearer ${this.jwtToken}`;
                    const res = await fetch(this.PRIMARY + endpoint, { headers, signal: controller.signal });
                    clearTimeout(tid);
                    if (res.status === 401 && !retried) {
                        await this.reAuthenticate();
                        return this.fetchAPI(endpoint, true);
                    }
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return res.json();
                } catch (e) {
                    clearTimeout(tid);
                    throw e;
                }
            },

            // ── Re-authenticate (get JWT) ──
            async reAuthenticate() {
                try {
                    const res = await fetch(this.PRIMARY + '/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            name: 'WC26MapApp',
                            email: `wc26map_${Date.now()}@app.local`,
                            password: 'WC26Map!2026'
                        })
                    });
                    const data = await res.json();
                    if (data.token) this.jwtToken = data.token;
                } catch(e) { /* silent */ }
            },

            // ── Build standings from joined teams + groups API data ──
            buildStandings(teamsArr, groupsArr) {
                // Build team lookup by id
                const teamById = {};
                teamsArr.forEach(t => {
                    const iso2 = ISO_OVERRIDE[t.iso2] || t.iso2.toLowerCase();
                    const apiName = t.name_en;
                    const displayName = DISPLAY_NAME_OVERRIDES[apiName] || apiName;
                    const mapName = API_TO_MAP_NAME[apiName] || apiName;
                    teamById[t.id] = { name: displayName, mapName, iso: iso2, flag: t.flag, apiName };
                });

                // Build group standings
                const standings = groupsArr.map(g => {
                    const letter = g.name;
                    const color = GROUP_COLORS[letter] || '#888';
                    const teams = g.teams
                        .map(entry => {
                            const t = teamById[entry.team_id];
                            if (!t) return null;
                            const team = {
                                name: t.name,
                                mapName: t.mapName,
                                iso: t.iso,
                                flag: t.flag,
                                gp: parseInt(entry.mp) || 0,
                                w:  parseInt(entry.w)  || 0,
                                d:  parseInt(entry.d)  || 0,
                                l:  parseInt(entry.l)  || 0,
                                gd: parseInt(entry.gd) || 0,
                                pts: parseInt(entry.pts) || 0
                            };
                            // Apply hardcoded corrections (fixes bad API iso2 / mapName values)
                            const hc = TEAM_HARDCODES[team.name];
                            if (hc) {
                                if (hc.iso)     team.iso     = hc.iso;
                                if (hc.mapName) team.mapName = hc.mapName;
                            }
                            return team;
                        })
                        .filter(Boolean)
                        .sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gp - a.gp);

                    return { group: `Group ${letter}`, color, teams };
                });

                return standings.sort((a, b) => {
                    const la = a.group.replace('Group ', '');
                    const lb = b.group.replace('Group ', '');
                    return la.localeCompare(lb);
                });
            },

            // ── Build matches lookup from games array ──
            buildMatches(gamesArr) {
                const matches = {};
                const now = new Date();
                // For each team, find their next upcoming match
                const upcoming = gamesArr
                    .filter(g => g.finished !== 'TRUE' && g.time_elapsed !== 'finished')
                    .sort((a, b) => new Date(a.local_date) - new Date(b.local_date));

                upcoming.forEach(g => {
                    const hName = g.home_team_name_en;
                    const aName = g.away_team_name_en;
                    if (!hName || !aName) return;
                    const hDisplay = DISPLAY_NAME_OVERRIDES[hName] || hName;
                    const aDisplay = DISPLAY_NAME_OVERRIDES[aName] || aName;
                    const hIso = (ISO_OVERRIDE[g.home_team_iso2] || (g.home_team_iso2 || '').toLowerCase());
                    const aIso = (ISO_OVERRIDE[g.away_team_iso2] || (g.away_team_iso2 || '').toLowerCase());
                    const dateStr = g.local_date ? g.local_date.split(' ')[0] : '';
                    const timeStr = g.local_date ? g.local_date.split(' ')[1] : '';
                    if (!matches[hDisplay]) {
                        matches[hDisplay] = { opponent: aDisplay, flag: `https://flagcdn.com/w40/${aIso}.png`, date: dateStr, time: timeStr, isFlagUrl: true };
                    }
                    if (!matches[aDisplay]) {
                        matches[aDisplay] = { opponent: hDisplay, flag: `https://flagcdn.com/w40/${hIso}.png`, date: dateStr, time: timeStr, isFlagUrl: true };
                    }
                });
                matches['def'] = { opponent: 'TBD', flag: '🏳️', date: 'TBD', time: '' };
                return matches;
            },

            // ── Check if any game is live; schedule appropriate refresh ──
            checkLiveAndSchedule(gamesArr) {
                const hasLive = gamesArr.some(g =>
                    g.time_elapsed === 'live' ||
                    g.time_elapsed === 'halftime' ||
                    (g.finished !== 'TRUE' && g.finished !== 'FALSE' && g.time_elapsed)
                );
                const indicator = document.getElementById('live-indicator');
                if (hasLive) {
                    this.isLive = true;
                    if (indicator) indicator.classList.add('visible');
                } else {
                    this.isLive = false;
                    if (indicator) indicator.classList.remove('visible');
                }
                clearTimeout(this.refreshTimer);
                const interval = hasLive ? this.LIVE_POLL_MS : this.REFRESH_INTERVAL_MS;
                this.refreshTimer = setTimeout(() => this.refresh(), interval);
            },

            // ── In-place update of standings rows without full re-render ──
            updateStandingsRows(newStandings) {
                newStandings.forEach(groupData => {
                    groupData.teams.forEach(team => {
                        const rowId = `row-${team.name.replace(/\s+/g, '')}`;
                        const row = document.getElementById(rowId);
                        if (!row) return;
                        const cells = row.querySelectorAll('.stat-cell, .gd-cell, .pts-cell');
                        // cells order: GP, W, D, L, GD, PTS
                        const vals = [team.gp, team.w, team.d, team.l, team.gd, team.pts];
                        cells.forEach((cell, i) => {
                            const newVal = String(vals[i]);
                            if (cell.textContent !== newVal) {
                                cell.textContent = newVal;
                                // Brief flash to signal update
                                cell.style.transition = 'none';
                                cell.style.color = 'var(--ios-blue)';
                                setTimeout(() => {
                                    cell.style.transition = 'color 1s ease';
                                    cell.style.color = '';
                                }, 50);
                            }
                        });
                    });
                });
            },

            // ── Background refresh (runs every 10min or 60s if live) ──
            async refresh() {
                try {
                    const [groupsData, gamesData] = await Promise.all([
                        this.fetchAPI('/get/groups'),
                        this.fetchAPI('/get/games')
                    ]);
                    // Rebuild standings with current teamsArr cached from init
                    if (this._teamsArr) {
                        const newStandings = this.buildStandings(this._teamsArr, groupsData.groups);
                        mockData.standings = newStandings;
                        this.updateStandingsRows(newStandings);
                    }
                    if (gamesData && gamesData.games) {
                        mockData.matches = this.buildMatches(gamesData.games);
                        this.checkLiveAndSchedule(gamesData.games);
                    } else {
                        this.checkLiveAndSchedule([]);
                    }
                } catch (e) {
                    // Silently reschedule
                    clearTimeout(this.refreshTimer);
                    this.refreshTimer = setTimeout(() => this.refresh(), this.REFRESH_INTERVAL_MS);
                }
            },

            // ── Fallback: parse openfootball JSON into standings ──
            async loadFallback() {
                try {
                    const res = await fetch(this.FALLBACK);
                    const data = await res.json();
                    // openfootball doesn't have standings, so we compute from match scores
                    const table = {}; // { teamName: { mp,w,d,l,gf,ga } }
                    const groupMap = {}; // { teamName: groupLetter }

                    if (data.matches) {
                        data.matches.forEach(m => {
                            if (!m.score || !m.group) return;
                            const grp = m.group.replace('Group ', '');
                            const h = m.team1, a = m.team2;
                            const hg = m.score.ft[0], ag = m.score.ft[1];
                            groupMap[h] = grp; groupMap[a] = grp;
                            if (!table[h]) table[h] = {mp:0,w:0,d:0,l:0,gf:0,ga:0};
                            if (!table[a]) table[a] = {mp:0,w:0,d:0,l:0,gf:0,ga:0};
                            table[h].mp++; table[a].mp++;
                            table[h].gf += hg; table[h].ga += ag;
                            table[a].gf += ag; table[a].ga += hg;
                            if (hg > ag) { table[h].w++; table[a].l++; }
                            else if (hg < ag) { table[a].w++; table[h].l++; }
                            else { table[h].d++; table[a].d++; }
                        });
                    }

                    // Map openfootball team names → our display names
                    const OF_NAME_MAP = {
                        'South Korea': 'Korea Republic', 'Czech Republic': 'Czechia',
                        'United States': 'USA', 'Bosnia & Herzegovina': 'Bosnia and Herzegovina',
                        'Ivory Coast': "Côte d'Ivoire", 'Turkey': 'Türkiye',
                        'DR Congo': 'Congo DR', 'Iran': 'Iran', 'Cape Verde': 'Cabo Verde'
                    };
                    const OF_ISO_MAP = {
                        'Mexico':'mx','South Africa':'za','South Korea':'kr','Czech Republic':'cz',
                        'Canada':'ca','Bosnia & Herzegovina':'ba','Qatar':'qa','Switzerland':'ch',
                        'Brazil':'br','Morocco':'ma','Haiti':'ht','Scotland':'gb-sct',
                        'United States':'us','Paraguay':'py','Australia':'au','Turkey':'tr',
                        'Germany':'de','Curaçao':'cw','Ivory Coast':'ci','Ecuador':'ec',
                        'Netherlands':'nl','Japan':'jp','Sweden':'se','Tunisia':'tn',
                        'Belgium':'be','Egypt':'eg','Iran':'ir','New Zealand':'nz',
                        'Spain':'es','Cape Verde':'cv','Saudi Arabia':'sa','Uruguay':'uy',
                        'France':'fr','Senegal':'sn','Iraq':'iq','Norway':'no',
                        'Argentina':'ar','Algeria':'dz','Austria':'at','Jordan':'jo',
                        'Portugal':'pt','DR Congo':'cd','Uzbekistan':'uz','Colombia':'co',
                        'England':'gb-eng','Croatia':'hr','Ghana':'gh','Panama':'pa'
                    };
                    const OF_MAPNAME = {
                        'United States':'United States of America','Czech Republic':'Czechia',
                        'South Korea':'South Korea','Ivory Coast':'Ivory Coast',
                        'DR Congo':'Democratic Republic of the Congo','Cape Verde':'Cabo Verde',
                        'Iran':'Iran','Turkey':'Turkey'
                    };

                    // Group by letter
                    const byGroup = {};
                    Object.entries(groupMap).forEach(([tname, grp]) => {
                        if (!byGroup[grp]) byGroup[grp] = [];
                        const s = table[tname] || {mp:0,w:0,d:0,l:0,gf:0,ga:0};
                        const displayName = OF_NAME_MAP[tname] || tname;
                        const mapName = OF_MAPNAME[tname] || tname;
                        const iso = OF_ISO_MAP[tname] || 'un';
                        byGroup[grp].push({
                            name: displayName, mapName, iso,
                            flag: `https://flagcdn.com/w40/${iso}.png`,
                            gp: s.mp, w: s.w, d: s.d, l: s.l,
                            gd: s.gf - s.ga, pts: s.w * 3 + s.d
                        });
                    });

                    // Fill missing teams with zero stats
                    const SEED = [
                        {l:'A',teams:['Mexico','South Africa','South Korea','Czech Republic']},
                        {l:'B',teams:['Canada','Bosnia & Herzegovina','Qatar','Switzerland']},
                        {l:'C',teams:['Brazil','Morocco','Haiti','Scotland']},
                        {l:'D',teams:['United States','Paraguay','Australia','Turkey']},
                        {l:'E',teams:['Germany','Curaçao','Ivory Coast','Ecuador']},
                        {l:'F',teams:['Netherlands','Japan','Sweden','Tunisia']},
                        {l:'G',teams:['Belgium','Egypt','Iran','New Zealand']},
                        {l:'H',teams:['Spain','Cape Verde','Saudi Arabia','Uruguay']},
                        {l:'I',teams:['France','Senegal','Iraq','Norway']},
                        {l:'J',teams:['Argentina','Algeria','Austria','Jordan']},
                        {l:'K',teams:['Portugal','DR Congo','Uzbekistan','Colombia']},
                        {l:'L',teams:['England','Croatia','Ghana','Panama']}
                    ];
                    SEED.forEach(({l, teams}) => {
                        if (!byGroup[l]) byGroup[l] = [];
                        teams.forEach(tname => {
                            if (!byGroup[l].find(t => t.name === (OF_NAME_MAP[tname] || tname))) {
                                const displayName = OF_NAME_MAP[tname] || tname;

        function hexRgba(hex, a) {
            const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
            return `rgba(${r},${g},${b},${a})`;

        function darkenHex(hex, t) {
            return '#' + [hex.slice(1,3),hex.slice(3,5),hex.slice(5,7)]

            return n.toLocaleString();

        // ── D3 Timeline ──
        function renderInfoTimeline(entries, container, accentColor) {
            if (!entries.length) return;
            const EW = 170, PAD = 18, CY = 95, DOTR = 7, CAPW = EW - 18;
            const W = EW * entries.length + PAD * 2, H = 200;
            const svg = d3.select(container).append('svg').attr('width', W).attr('height', H);

            svg.append('line')
                .attr('x1', PAD).attr('x2', W - PAD)
                .attr('y1', CY).attr('y2', CY)
                .attr('stroke','rgba(255,255,255,0.18)')
                .attr('stroke-width',1.5).attr('stroke-dasharray','4 5');

            entries.forEach((entry, i) => {
                const x = PAD + i * EW + EW / 2;
                const above = i % 2 === 0;
                const tickH = 18;

                svg.append('circle').attr('cx',x).attr('cy',CY).attr('r',DOTR)
                    .attr('fill', accentColor || '#00d1ff')
                    .attr('stroke','rgba(255,255,255,0.2)').attr('stroke-width',1.5);

                svg.append('line')
                    .attr('x1',x).attr('x2',x)
                    .attr('y1', above ? CY - DOTR : CY + DOTR)
                    .attr('y2', above ? CY - DOTR - tickH : CY + DOTR + tickH)
                    .attr('stroke','rgba(255,255,255,0.18)').attr('stroke-width',1);

                svg.append('text')
                    .attr('x',x)
                    .attr('y', above ? CY - DOTR - tickH - 4 : CY + DOTR + tickH + 15)
                    .attr('text-anchor','middle')
                    .attr('font-family',"'Koulen', sans-serif").attr('font-weight','400').attr('font-size','16')
                    .attr('fill','#fff').text(entry.year);

                const foY = above ? 0 : CY + DOTR + tickH + 18;
                const foH = above ? CY - DOTR - tickH - 8 : H - foY;
                const fo = svg.append('foreignObject')
                    .attr('x', x - CAPW/2).attr('y', foY)
                    .attr('width', CAPW).attr('height', foH);
                fo.append('xhtml:div')
                    .style('font-family',"'Outfit', sans-serif")
                    .style('font-size','10px').style('line-height','1.4').style('font-weight','500')
                    .style('color','rgba(255,255,255,0.7)')
                    .style('overflow','hidden')
                    .style('display','-webkit-box').style('-webkit-line-clamp','4')
                    .style('-webkit-box-orient','vertical')
                    .text(entry.event);
            });
        }

        // ── Drag-to-scroll (mouse + touch + inertia) ──
        function initDragScroll(el) {
            let down = false, startX, scrollLeft, velX = 0, lastX, raf;
            el.addEventListener('mousedown', e => {
                down = true; el.classList.add('dragging');
                startX = e.pageX - el.offsetLeft; scrollLeft = el.scrollLeft;
                lastX = e.pageX; velX = 0; cancelAnimationFrame(raf);
            });
            el.addEventListener('mouseleave', () => { down = false; el.classList.remove('dragging'); });
            el.addEventListener('mouseup', () => { down = false; el.classList.remove('dragging'); coast(el); });
            el.addEventListener('mousemove', e => {
                if (!down) return; e.preventDefault();
                const x = e.pageX - el.offsetLeft;
                velX = e.pageX - lastX; lastX = e.pageX;
                el.scrollLeft = scrollLeft - (x - startX) * 1.2;
            });
            el.addEventListener('touchstart', e => {
                startX = e.touches[0].pageX; scrollLeft = el.scrollLeft; velX = 0; lastX = startX;
                cancelAnimationFrame(raf);
            }, { passive: true });
            el.addEventListener('touchmove', e => {
                const x = e.touches[0].pageX;
                velX = x - lastX; lastX = x;
                el.scrollLeft = scrollLeft - (x - startX);
            }, { passive: true });
            el.addEventListener('touchend', () => coast(el));
            function coast(el) {
                cancelAnimationFrame(raf);
                (function step() {
                    if (Math.abs(velX) < 0.5) return;
                    el.scrollLeft -= velX; velX *= 0.92;
                    raf = requestAnimationFrame(step);
                })();
            }
        }

            const rowId = `row-${countryName.replace(/\s+/g, '')}`;
            d3.select(`#${rowId}`).classed("highlight", true);
            
            const rowEl = document.getElementById(rowId);
            if(rowEl) {
                rowEl.closest('.group-card').scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
        }

        function closePanels() {
            d3.select("#right-panel").classed("open", false);
        }

        function findTeamStandingsData(countryName, requireExactNameMatch = false) {
            for (let i = 0; i < mockData.standings.length; i++) {
                const group = mockData.standings[i];
                const teamRank = group.teams.findIndex(t => 
                    t.name === countryName || (!requireExactNameMatch && t.mapName === countryName)
                );
                if (teamRank !== -1) {
                    return {
                        groupName: group.group,
                        team: group.teams[teamRank],
                        rank: teamRank + 1 
                    };
                }
            }
            return null;
        }

        // --- GENERAL SETUP ---

        d3.select("#map-canvas").on("click", (event) => {
            if (event.target.tagName === "svg" || event.target.tagName === "g") {
                 clearSelections();
            }
        });

        window.addEventListener("resize", () => {
            const width = window.innerWidth;
            const height = window.innerHeight;

            projection
                .scale(Math.min(width, height) * 0.50)
                .translate([width / 2, (height - 240) / 2]); 
                
            zoom.translateExtent([[-width, -height], [width * 2, height * 2]]);

            svg.attr("width", width).attr("height", height);
            g.selectAll(".country").attr("d", path);
            
            g.selectAll(".country-label").attr("transform", d => {
                if (d.properties.name === "France") {
                    const proj = projection([2.21, 46.22]);
                    return `translate(${proj[0]},${proj[1]})`;
                }
                const centroid = path.centroid(d);
                if (isNaN(centroid[0]) || isNaN(centroid[1])) return "translate(-9999,-9999)";
                return `translate(${centroid[0]},${centroid[1]})`;
            });
        });

        // --- CAROUSEL SCROLLING ---
        document.getElementById("scroll-left").addEventListener("click", () => {
            document.getElementById("bottom-dock").scrollBy({ left: -300, behavior: 'smooth' });
        });
        document.getElementById("scroll-right").addEventListener("click", () => {
            document.getElementById("bottom-dock").scrollBy({ left: 300, behavior: 'smooth' });
        });

    </script>
</body>
</html>
