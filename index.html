<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026 - World Map</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
    <script src="flag-colors.js"></script>
    <!-- Fonts for country card -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Koulen&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0A0E1F;
            --map-country: #1C2340;
            --map-ocean: #080C1A;
            --map-border: rgba(255,255,255,0.08);
            --frosted-bg: rgba(255,255,255,0.06);
            --frosted-border: 1px solid rgba(255,255,255,0.1);
            --card-border: rgba(255,255,255,0.06);
            --ios-blue: #007AFF;
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255,255,255,0.55);
            
            --header-bg: rgba(28, 35, 64, 0.75);
            --pill-slider-bg: #FFFFFF;
            --pill-selected-text: #0A0E1F;
            
            --country-hover: #2A3560;
            --country-part: #3A4B86;
            --country-part-hover: #4D62B3;
            --country-part-stroke: rgba(0, 122, 255, 0.4);
            
            --group-card-bg: rgba(255,255,255,0.03);
            --row-hover: rgba(255,255,255,0.05);
            --label-fill: rgba(255,255,255,0.4);
            
            --font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Inter, system-ui, sans-serif;
            --font-display: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Inter, system-ui, sans-serif;
            --font-body: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Inter, system-ui, sans-serif;
            --transition-speed: 0.2s;
            --ease-cubic: cubic-bezier(0.4, 0, 0.2, 1);
            
            --panel-bg: #0E0E10;
            --panel-text-primary: #FFFFFF;
            --panel-text-secondary: rgba(255,255,255,0.6);
            --panel-border: rgba(255,255,255,0.1);
        }

        body.theme-light {
            /* Light blue ocean, cream countries, soft blue participating */
            --bg-color: #CBDCEB;
            --map-country: #F5EFE6;
            --map-ocean: #CBDCEB;
            --map-border: rgba(0,0,0,0.08);
            --frosted-bg: rgba(245, 239, 230, 0.8);
            --frosted-border: 1px solid rgba(0,0,0,0.1);
            --card-border: rgba(0,0,0,0.08);
            --text-primary: #1A1A1A;
            --text-secondary: rgba(0,0,0,0.6);
            
            --header-bg: rgba(245, 239, 230, 0.85);
            --pill-slider-bg: #6D94C5;
            --pill-selected-text: #FFFFFF;
            
            --country-hover: #FFFFFF;
            --country-part: #6D94C5;
            --country-part-hover: #5B81B3;
            --country-part-stroke: rgba(0, 0, 0, 0.1);
            
            --group-card-bg: rgba(0,0,0,0.04);
            --row-hover: rgba(0,0,0,0.06);
            --label-fill: rgba(0,0,0,0.5);

            --panel-bg: #FFFFFF;
            --panel-text-primary: #1A1A1A;
            --panel-text-secondary: rgba(0,0,0,0.6);
            --panel-border: rgba(0,0,0,0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            font-size: 14px;
            transition: background-color 0.3s var(--ease-cubic), color 0.3s var(--ease-cubic);
        }

        /* TOP CONTROLS */
        .top-left-controls {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 1000;
        }

        .top-right-controls {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 1000;
        }

        .pill-tab-control {
            display: flex;
            background-color: var(--header-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: var(--frosted-border);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
            border-radius: 20px;
            height: 36px;
            align-items: center;
            position: relative;
            padding: 2px;
            box-sizing: border-box;
            transition: background-color 0.3s var(--ease-cubic), border-color 0.3s var(--ease-cubic);
        }

        .slider-bg {
            position: absolute;
            top: 2px;
            left: 0; 
            height: calc(100% - 4px);
            background-color: var(--pill-slider-bg);
            border-radius: 16px;
            z-index: 1;
            transition: background-color 0.3s var(--ease-cubic);
        }

        .pill-tab {
            padding: 0 16px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            cursor: pointer;
            transition: color var(--transition-speed);
            position: relative;
            z-index: 2;
            font-weight: 500;
        }

        .pill-tab.selected {
            color: var(--pill-selected-text);
            font-weight: 600;
        }

        /* BOTTOM DOCK (STANDINGS) */
        .bottom-dock {
            position: absolute;
            inset: 0;
            background: transparent;
            background-color: transparent;
            border: none;
            border-radius: 24px;
            pointer-events: auto;
            width: 100%;
            padding: 0;
            overflow-x: auto;
            overflow-y: visible;
            box-sizing: border-box;
            transition: background-color 0.3s var(--ease-cubic), border-color 0.3s var(--ease-cubic);
            scrollbar-width: none;
        }
        .bottom-dock::-webkit-scrollbar { display: none; }

        .dock-content {
            display: flex;
            flex-direction: row;
            overflow: visible;
            padding: 0 16px 0 16px;
            padding-right: 36px; /* clearance for last card border-radius */
            gap: 12px;
            scrollbar-width: none;
            -ms-overflow-style: none;
            min-width: max-content;
            width: max-content;
            height: 100%;
            box-sizing: border-box;
            align-items: flex-end;
            padding-bottom: 0;
        }
        
        .dock-content::-webkit-scrollbar {
            display: none;
        }

        .group-card {
            flex: 0 0 380px;
            flex-shrink: 0;
            margin: 0 8px;
            background-color: var(--group-card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            transition: background-color 0.3s var(--ease-cubic), border-color 0.3s var(--ease-cubic);
            overflow: hidden;
        }
        .group-card:first-child {
            margin-left: 16px;
        }
        .group-card:last-child {
            margin-right: 16px;
        }

        .standings-table {
            display: flex;
            flex-direction: column;
            padding-top: 6px;
            padding-bottom: 6px;
        }

        .group-header-inline {
            font-weight: 600;
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: left !important;
        }

        .table-row {
            display: grid;
            grid-template-columns: 28px 1fr 28px 28px 28px 28px 32px 32px;
            align-items: center;
            height: 26px;
            cursor: pointer;
            border-radius: 6px;
            transition: background-color 0.1s;
            column-gap: 4px;
            padding: 2px 10px;
            line-height: 1.1;
        }

        .table-row.no-hover {
            cursor: default;
            margin-bottom: 0;
            height: 26px;
            padding: 2px 10px;
            background: linear-gradient(135deg, var(--group-color) 0%, var(--bg-color) 100%);
            border-radius: 0;
        }

        .table-row.no-hover .group-header-inline,
        .table-row.no-hover .header-cell {
            color: #FFFFFF !important;
        }

        .table-row:not(.no-hover):hover {
            background-color: var(--row-hover);
        }

        .table-row.highlight {
            background-color: rgba(128, 128, 128, 0.15); /* Soft tint instead of solid color */
        }

        .table-row span {
            text-align: center;
        }

        .country-flag-circle {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #222; 
            margin: 0 auto;
        }

        .country-flag-emoji {
            font-size: 16px;
        }

        .country-name-cell {
            text-align: left !important;
            padding-left: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 13px;
            font-weight: 500;
        }

        .header-cell {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-secondary);
            text-align: center !important;
        }

        .stat-cell, .gd-cell {
            font-size: 13px;
            font-weight: 500;
            text-align: center !important;
        }

        .pts-cell {
            color: var(--text-primary);
            font-weight: 700;
            font-size: 13px;
            text-align: center !important;
        }

        /* MAIN CANVAS & MAP */
        .main-canvas {
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 100;
            background-color: var(--map-ocean);
            transition: background-color 0.3s var(--ease-cubic);
        }
        
        .main-canvas.map-on-top {
            z-index: 995 !important;
            pointer-events: auto !important;
        }

        .left-fixtures-container {
            position: fixed;
            bottom: 24px;
            left: 24px;
            width: calc(50vw - 48px);
            z-index: 1010;
            display: none;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            pointer-events: auto;
            max-height: 220px;
            overflow-y: auto;
            padding-right: 4px;
            box-sizing: border-box;
        }

        .left-fixtures-container::-webkit-scrollbar {
            width: 4px;
        }
        .left-fixtures-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .left-fixtures-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
        }
        
        .dimmed {
            opacity: 0.15 !important;
            pointer-events: none !important;
        }
        
        .match-card,
        .match-card-team,
        .bracket-col,
        .main-canvas,
        .group-card,
        .table-row,
        .timeline-panel {
            transition: opacity 250ms ease !important;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .country {
            fill: var(--map-country);
            stroke: var(--map-border);
            stroke-width: 0.5px;
            cursor: pointer;
            transition: fill 0.3s var(--ease-cubic), filter 0.2s var(--ease-cubic), stroke 0.3s var(--ease-cubic);
        }

        .country:hover {
            fill: var(--country-hover);
        }

        /* Visual Distinction for Participating Countries */
        body.view-qualified .country.participating,
        body.view-r32 .country.r32-team,
        body.view-r16 .country.r16-team,
        body.view-quaters .country.qf-team,
        body.view-semis .country.sf-team,
        body.view-final .country.final-team {
            fill: var(--country-part); 
            stroke: var(--country-part-stroke);
        }

        body.view-qualified .country.participating:hover,
        body.view-r32 .country.r32-team:hover,
        body.view-r16 .country.r16-team:hover,
        body.view-quaters .country.qf-team:hover,
        body.view-semis .country.sf-team:hover,
        body.view-final .country.final-team:hover {
            fill: var(--country-part-hover);
        }

        /* Eliminated Countries during Knockout Stages — dimmed and non-interactive */
        body.view-r32 .country:not(.r32-team),
        body.view-r16 .country:not(.r16-team),
        body.view-quaters .country:not(.qf-team),
        body.view-semis .country:not(.sf-team),
        body.view-final .country:not(.final-team) {
            fill-opacity: 0.25;
            stroke: none;
            cursor: default;
        }

        /* Active State always uses iOS blue, regardless of view mode */
        .country.active, .country.participating.active {
            fill: var(--ios-blue) !important;
            filter: drop-shadow(0 0 15px rgba(0, 122, 255, 0.8));
            stroke: none !important;
        }

        .map-has-selection .country:not(.active) {
            filter: blur(4px);
            opacity: 0.5;
        }

         /* COUNTRY LABELS */
        .country-label {
            font-family: var(--font-family);
            font-size: 12px;
            fill: var(--label-fill);
            text-anchor: middle;
            dominant-baseline: middle;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s var(--ease-cubic), fill 0.3s var(--ease-cubic);
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* TOOLTIP */
        .tooltip {
            position: absolute;
            background: var(--frosted-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: var(--frosted-border);
            padding: 8px 12px;
            border-radius: 8px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s var(--ease-cubic), background-color 0.3s var(--ease-cubic), border-color 0.3s var(--ease-cubic);
            z-index: 1100;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* APPLE STYLE SIDE PANEL */
        .right-side-panel {
            display: none !important;
        }
        .right-side-panel::-webkit-scrollbar { display: none; }
        .right-side-panel.open { display: none !important; }

        /* ── INFO CARD STYLES ─────────────────────────────────────────── */
        .right-panel-content { padding: 0; }

        /* Header */
        .ic-header {
            position: relative;
            min-height: 140px;
            display: flex;
            align-items: flex-end;
            padding: 24px 24px 20px;
            overflow: hidden;
            border-radius: 24px 24px 0 0;
        }
        .ic-header-gradient {
            position: absolute; inset: 0; z-index: 0;
            height: 100%;
        }
        .ic-header-text { position: relative; z-index: 2; flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
        .ic-country-name {
            font-family: var(--font-display);
            font-size: 36px;
            font-weight: 800;
            line-height: 1;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            color: #FFFFFF;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
            font-variant-numeric: tabular-nums;
        }
        .ic-group-label {
            font-family: var(--font-body);
            font-size: 13px; font-weight: 500;
            letter-spacing: 0.5px; text-transform: uppercase;
            color: rgba(255,255,255,0.7);
            margin-bottom: 2px;
        }
        
        .ic-subtitle {
            display: inline-flex; align-items: center; gap: 6px; margin-top: 6px;
        }

        .ic-flag-box {
            position: absolute; top: 24px; right: 24px; z-index: 2;
            width: 44px; height: 32px; border-radius: 6px; overflow: hidden;
            background: rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .ic-flag-box img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* Group tag - no longer used separately, merged into header */
        .ic-group-tag { display: none; }

        /* Stat tiles */
        /* Stat strip */
        .ic-stats {
            display: flex;
            align-items: center;
            padding: 16px 24px;
            background: transparent;
            border-bottom: 1px solid var(--panel-border);
        }
        .ic-tile {
            flex: 1;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-right: 1px solid var(--panel-border);
            padding: 0 4px;
        }
        .ic-tile:last-child { border-right: none; }
        
        .ic-tile-value {
            font-family: var(--font-display);
            font-size: 20px; font-weight: 700;
            line-height: 1; color: var(--panel-text-primary);
            font-variant-numeric: tabular-nums;
            margin-bottom: 4px;
        }
        .ic-tile-label {
            font-family: var(--font-body);
            font-size: 10px; font-weight: 600;
            letter-spacing: 0.5px; text-transform: uppercase;
            color: var(--panel-text-secondary);
        }
        .ic-tile-value.sm { font-size: 16px; }
        
        /* Form indicator (dots) */
        .ic-form-dots {
            display: flex; gap: 4px; align-items: center;
        }
        .ic-form-dot {
            width: 8px; height: 8px; border-radius: 50%;
        }
        .ic-form-dot.win { background: #34C759; }
        .ic-form-dot.loss { background: #FF3B30; }
        .ic-form-dot.draw { background: #8E8E93; }
        
        /* Skeleton loading */
        .ic-skeleton {
            background: linear-gradient(90deg, rgba(128,128,128,0.1) 25%, rgba(128,128,128,0.2) 50%, rgba(128,128,128,0.1) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
            color: transparent !important;
            min-width: 32px;
            height: 20px;
            display: inline-block;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .ic-form-results { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 3px; }
        .ic-form-match { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .ic-opp-flag {
            width: 22px; height: 22px; border-radius: 50%; overflow: hidden;
            position: relative;
            flex-shrink: 0;
        }
        .ic-opp-flag img { width: 100%; height: 100%; object-fit: cover; }
        .ic-result-badge {
            width: 14px; height: 14px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-body);
            font-size: 9px; font-weight: 700;
            color: #fff;
            margin-top: -8px; z-index: 2; border: 2px solid #000;
        }
        .ic-result-badge.win  { background: #30d158; }
        .ic-result-badge.loss { background: #ff453a; }
        .ic-result-badge.draw { background: #8e8e93; }

        /* Body */
        .ic-body { padding: 24px; }
        .ic-divider { height: 1px; background: var(--panel-border); margin: 24px -24px; }
        .ic-section-heading {
            font-family: var(--font-body);
            font-size: 16px; font-weight: 600;
            color: var(--panel-text-primary); margin-bottom: 12px;
        }
        .ic-overview {
            font-family: var(--font-body);
            font-size: 15px; line-height: 1.5; font-weight: 400;
            color: var(--panel-text-primary); margin-bottom: 24px;
        }

        /* Timeline */
        .ic-timeline-panel {
            margin-bottom: 24px;
        }
        .ic-timeline-title {
            font-family: var(--font-body);
            font-size: 16px; font-weight: 600;
            color: var(--panel-text-primary); margin-bottom: 12px;
        }
        .ic-timeline-scroll {
            display: flex; gap: 12px;
            overflow-x: auto; overflow-y: hidden;
            scroll-snap-type: x mandatory;
            -ms-overflow-style: none; scrollbar-width: none;
            padding-bottom: 8px; /* Room for subtle scroll or shadows if any */
        }
        .ic-timeline-scroll::-webkit-scrollbar { display: none; }
        
        .ic-timeline-card {
            flex: 0 0 150px;
            scroll-snap-align: start;
            background: rgba(128,128,128,0.05);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 12px;
            display: flex; flex-direction: column; gap: 6px;
        }
        .ic-timeline-year {
            font-family: var(--font-body);
            font-size: 12px; font-weight: 700;
            color: var(--ios-blue);
        }
        .ic-timeline-event {
            font-family: var(--font-body);
            font-size: 13px; font-weight: 500;
            color: var(--panel-text-primary);
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
        }

        /* Players */
        .ic-players { margin-bottom: 0; }
        .ic-player-list { display: flex; flex-direction: column; padding: 0; margin: 0; }
        .ic-player-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--panel-border);
        }
        .ic-player-item:last-child { border-bottom: none; }
        .ic-player-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(128,128,128,0.1);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-body); font-weight: 600; font-size: 14px; color: var(--panel-text-secondary);
        }
        .ic-player-info { display: flex; flex-direction: column; gap: 2px; }
        .ic-player-name { font-family: var(--font-body); font-size: 15px; font-weight: 600; color: var(--panel-text-primary); }
        .ic-player-club { font-family: var(--font-body); font-size: 13px; font-weight: 500; color: var(--panel-text-secondary); }

        /* kept for backwards compat — no longer rendered */
        .next-match-card, .match-details, .opponent-row, .opponent-name, .match-time, .chevron { display: none; }

        /* CAROUSEL ARROWS */
        .bottom-dock-wrapper {
            position: fixed;
            bottom: 8px;
            left: 24px;
            right: 24px;
            height: 155px;
            z-index: 900;
            pointer-events: none;
            overflow: visible;
        }
        
        .carousel-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            background: var(--header-bg);
            border: var(--frosted-border);
            color: var(--text-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 910;
            backdrop-filter: blur(10px);
            pointer-events: auto;
            transition: background 0.2s, transform 0.2s;
        }

        .carousel-arrow:hover {
            background: var(--country-hover);
            transform: translateY(-50%) scale(1.05);
        }

        .carousel-arrow:active {
            transform: translateY(-50%) scale(0.95);
        }

        .carousel-arrow.left { left: -20px; }

    <script>

const ISO3_TO_ALPHA2 = {
  // Group A
  "MEX": "mx",
  "USA": "us",
  "CAN": "ca",
  "URU": "uy",
  // Group B
  "SUI": "ch",   // Switzerland — FIFA uses SUI, alpha-2 is ch
  "BIH": "ba",   // Bosnia and Herzegovina
  "QAT": "qa",
  // Group C
  "BRA": "br",
  "MAR": "ma",
  "SCO": "gb-sct",  // Scotland — flagcdn supports gb-sct
  "HAI": "ht",
  // Group D
  "AUS": "au",
  "PRY": "py",   // Paraguay
  "TUR": "tr",   // Türkiye
  // Group E
  "GER": "de",
  "CIV": "ci",   // Côte d'Ivoire
  "ECU": "ec",
  "CUW": "cw",   // Curaçao — NOT cu (Cuba)
  // Group F
  "NED": "nl",   // Netherlands — FIFA uses NED
  "JPN": "jp",
  "SWE": "se",
  "TUN": "tn",
  // Group G
  "EGY": "eg",
  "BEL": "be",
  "IRN": "ir",   // IR Iran
  "NZL": "nz",
  // Group H
  "ESP": "es",
  "CPV": "cv",   // Cabo Verde — NOT cp
  "KSA": "sa",   // Saudi Arabia
  // Group I
  "NOR": "no",
  "FRA": "fr",
  "SEN": "sn",
  "IRQ": "iq",
  // Group J
  "ARG": "ar",
  "AUT": "at",
  "JOR": "jo",
  "ALG": "dz",   // Algeria — alpha-2 is dz
  // Group K
  "COL": "co",
  "COD": "cd",   // Congo DR — NOT co (Colombia)
  "POR": "pt",
  "UZB": "uz",
  // Group L
  "KOR": "kr",   // Korea Republic — NOT ko
  "GHA": "gh",
  "GER": "de",
  "ENG": "gb-eng",  // England — flagcdn supports gb-eng
  "CRO": "hr",   // Croatia
  "CZE": "cz",
  "PAN": "pa",
  "RSA": "za",   // South Africa
  "SCT": "gb-sct",
  "SEN": "sn",
};

function getAlpha2(code) {
  if (!code) return "un";
  const upperCode = code.toUpperCase();
  if (ISO3_TO_ALPHA2[upperCode]) {
    return ISO3_TO_ALPHA2[upperCode];
  }
  return code.toLowerCase();
}


        // --- Segmented Control Animation & Mode Toggling Setup ---
        function initPillControl(containerId, callback) {
            const container = document.getElementById(containerId);
            if (!container) return;
            const tabs = container.querySelectorAll(".pill-tab");
            const slider = container.querySelector(".slider-bg");

            function updateSlider(tab) {
                slider.style.width = tab.offsetWidth + "px";
                slider.style.transform = `translateX(${tab.offsetLeft}px)`;
            }

            // Init position instantly to avoid snapping on load
            const activeTab = container.querySelector(".pill-tab.selected");
            if (activeTab) {
                slider.style.transition = 'none';
                updateSlider(activeTab);

                return parseInt(str, 10);

            return getPoints(hs) > getPoints(as) ? h : a;

                leftSF: 101, rightSF: 102, final: 104
            };

            return {
                id: matchNumMap[key] || key,
                finished,
                date: node.date || '',
                home: {
                    name: hName,
                    label: getLabel(node.home),
                    flagUrl: hName ? flagUrl(hName) : null,
                    scoreStr: isScorePresent(hScore) ? String(hScore) : '–',
                    isWinner: hWins,
                    isLoser: finished && !hWins,
                    eliminated: node.home.eliminated || (finished && !hWins)
                },
                away: {
                    name: aName,
                    label: getLabel(node.away),
                    flagUrl: aName ? flagUrl(aName) : null,
                    scoreStr: isScorePresent(aScore) ? String(aScore) : '–',
                    isWinner: aWins,
                    isLoser: finished && !aWins,
                    eliminated: node.away.eliminated || (finished && !aWins)
                }
            };
        }

        function getMatchesFromSubtree(nodeKey, roundKey) {
            const matches = [];
            
            function traverse(key) {
                const node = BRACKET[key];
                if (!node) return;
                
                let currentRound = null;
                if (key === 'final') currentRound = 'final';
                else if (key === 'leftSF' || key === 'rightSF') currentRound = 'sf';
                else if (key.startsWith('qf')) currentRound = 'qf';
                else if (key.startsWith('r16')) currentRound = 'r16';
                else if (key.startsWith('r32')) currentRound = 'r32';
                
                if (currentRound === roundKey) {
                    matches.push(buildRenderMatch(key, node));
                }
                
                if (node.home && node.home.ref) traverse(node.home.ref);
                if (node.away && node.away.ref) traverse(node.away.ref);
            }
            
            traverse(nodeKey);
            return matches;
        }

        function updateBracketScoresFromAPI(gamesArr) {
            if (!gamesArr || gamesArr.length === 0) return;
            
            Object.keys(BRACKET).forEach(key => {
                const node = BRACKET[key];
                if (key === 'final' || key === 'leftSF' || key === 'rightSF' || key.startsWith('qf')) {
                    const hName = node.home.team || resolveTeamName(node.home);
                    const aName = node.away.team || resolveTeamName(node.away);
                    if (hName && aName) {
                        const match = gamesArr.find(g => 
                            (g.home_team_name_en === hName && g.away_team_name_en === aName) ||
                            (g.home_team_name_en === aName && g.away_team_name_en === hName)
                        );
                        if (match && match.finished === 'TRUE') {
                            const isHome = match.home_team_name_en === hName;
                            node.home.score = isHome ? match.home_score : match.away_score;
                            node.away.score = isHome ? match.away_score : match.home_score;
                            const hPen = match.home_penalty_score;
                            const aPen = match.away_penalty_score;
                            if (hPen && aPen && hPen !== 'null' && aPen !== 'null') {
                                node.home.score += ` (${isHome ? hPen : aPen})`;
                                node.away.score += ` (${isHome ? aPen : hPen})`;
                            }
                        }
                    }
                } else if (key.startsWith('r16') || key.startsWith('r32')) {
                    const hName = node.home.team;
                    const aName = node.away.team;
                    if (hName && aName) {
                        const match = gamesArr.find(g => 
                            (g.home_team_name_en === hName && g.away_team_name_en === aName) ||
                            (g.home_team_name_en === aName && g.away_team_name_en === hName)
                        );
                        if (match && match.finished === 'TRUE') {
                            const isHome = match.home_team_name_en === hName;
                            node.home.score = isHome ? match.home_score : match.away_score;
                            node.away.score = isHome ? match.away_score : match.home_score;
                            const hPen = match.home_penalty_score;
                            const aPen = match.away_penalty_score;
                            if (hPen && aPen && hPen !== 'null' && aPen !== 'null') {
                                node.home.score += ` (${isHome ? hPen : aPen})`;
                                node.away.score += ` (${isHome ? aPen : hPen})`;
                            }
                        }
                    }
                }
            });
        }

        function buildKnockoutMatchesFromTree() {
            const buckets = { r32: [], r16: [], qf: [], sf: [], final: [] };
            
            buckets.final = [buildRenderMatch('final', BRACKET.final)];
            
            buckets.sf = [
                buildRenderMatch('leftSF', BRACKET.leftSF),
                buildRenderMatch('rightSF', BRACKET.rightSF)
            ];
            
            buckets.qf = [
                buildRenderMatch('qfL1', BRACKET.qfL1),
                buildRenderMatch('qfL2', BRACKET.qfL2),
                buildRenderMatch('qfR1', BRACKET.qfR1),
                buildRenderMatch('qfR2', BRACKET.qfR2)
            ];
            
            buckets.r16 = [
                buildRenderMatch('r16L1', BRACKET.r16L1),
                buildRenderMatch('r16L2', BRACKET.r16L2),
                buildRenderMatch('r16L3', BRACKET.r16L3),
                buildRenderMatch('r16L4', BRACKET.r16L4),
                buildRenderMatch('r16R1', BRACKET.r16R1),
                buildRenderMatch('r16R2', BRACKET.r16R2),
                buildRenderMatch('r16R3', BRACKET.r16R3),
                buildRenderMatch('r16R4', BRACKET.r16R4)
            ];
            
            buckets.r32 = [
                buildRenderMatch('r32_GER_PAR', BRACKET.r32_GER_PAR),
                buildRenderMatch('r32_FRA_SWE', BRACKET.r32_FRA_SWE),
                buildRenderMatch('r32_RSA_CAN', BRACKET.r32_RSA_CAN),
                buildRenderMatch('r32_NED_MAR', BRACKET.r32_NED_MAR),

        function buildKnockoutMatches(gamesArr) {
            // 1. Update scores from API if available
            try {
                updateBracketScoresFromAPI(gamesArr);
            } catch (e) {
                console.error("Error updating bracket scores from API:", e);
            }

            // 2. Build the buckets from the BRACKET tree

        }

        function buildMatchCardHTML(match) {
            const hTeam = match.home && match.home.name ? match.home.name : '';
            const aTeam = match.away && match.away.name ? match.away.name : '';
            function teamRow(side) {

        const ROUND_ORDER = ['r32', 'r16', 'qf', 'sf', 'final'];
        const ROUND_LABEL = { r32: 'Round of 32', r16: 'Round of 16', qf: 'Quarters', sf: 'Semis', final: 'Final' };

        const BRACKET_COLUMNS = [
            { id: 'col-r32-left',  round: 'r32',   label: 'Round of 32', matches: (m) => getMatchesFromSubtree('leftSF', 'r32') },
            { id: 'col-r16-left',  round: 'r16',   label: 'Round of 16', matches: (m) => getMatchesFromSubtree('leftSF', 'r16') },

        function renderBracket(activeRound) {
            const area = document.getElementById('bracket-scroll-area');
            if (!area) return;
            area.innerHTML = '';
            console.log('[WC26] renderBracket called, activeRound:', activeRound);

            let targetId = 'col-final';
            if (activeRound === 'r32') targetId = 'col-r32-left';
            else if (activeRound === 'r16') targetId = 'col-r16-left';
            else if (activeRound === 'qf') targetId = 'col-qf-left';
            else if (activeRound === 'sf') targetId = 'col-sf-left';

            const selectedIdx = BRACKET_COLUMNS.findIndex(c => c.id === targetId);

            BRACKET_COLUMNS.forEach((col, i) => {
                // Separator between columns
                if (i > 0) {
                    const sep = document.createElement('div');
                    sep.className = 'bracket-round-separator';
                    area.appendChild(sep);
                }

                const allMatches = mockData.knockoutMatches[col.round] || [];
                const matches = col.matches(allMatches);

                const isActive = col.round === activeRound;
                const layoutClass = isActive ? 'bracket-col--active' : 'bracket-col--inactive';

                const roundEl = document.createElement('div');
                roundEl.className = 'bracket-col ' + layoutClass + (isActive ? ' active-round' : '');
                roundEl.id = col.id;
                roundEl.dataset.round = col.round;

                const header = document.createElement('div');
                header.className = 'bracket-round-header';
                header.textContent = col.label;
                roundEl.appendChild(header);

                const cardsWrap = document.createElement('div');
                cardsWrap.className = 'bracket-round-cards';

                if (matches.length === 0) {
                    cardsWrap.innerHTML = `<div style="padding:16px;color:rgba(255,255,255,0.3);font-size:12px;text-align:center">TBD</div>`;
                } else {
                    matches.forEach(match => {
                        cardsWrap.insertAdjacentHTML('beforeend', buildMatchCardHTML(match));
                    });
                }

                roundEl.appendChild(cardsWrap);
                area.appendChild(roundEl);
            });

            // Smooth scroll/jump to active round
            requestAnimationFrame(() => {
                let targetId = 'col-final';
                if (activeRound === 'r32') targetId = 'col-r32-left';
                else if (activeRound === 'r16') targetId = 'col-r16-left';
                else if (activeRound === 'qf') targetId = 'col-qf-left';
                else if (activeRound === 'sf') targetId = 'col-sf-left';
                
                const targetEl = document.getElementById(targetId);
                const container = document.getElementById('bracket-view');
                if (targetEl && container) {
                    const containerRect = container.getBoundingClientRect();
                    const elRect = targetEl.getBoundingClientRect();
                    // Scroll target element to center of scroll container
                    const targetScroll = container.scrollLeft + (elRect.left - containerRect.left) - (containerRect.width / 2 - elRect.width / 2);
                    container.scrollTo({ left: Math.max(0, targetScroll), behavior: 'smooth' });
                }
            });
        }

        // ============================================================
        //  LIVE DATA SERVICE
        // ============================================================
        const LiveDataService = {
            PRIMARY: 'http://worldcup26.ir:3050',
            FALLBACK: 'https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json',
            REFRESH_INTERVAL_MS: 10 * 60 * 1000,  // 10 minutes
            LIVE_POLL_MS: 60 * 1000,               // 60 seconds during live matches
            jwtToken: null,
            refreshTimer: null,
            isLive: false,

            // ── Fetch wrapper with timeout + optional JWT ──
            async fetchAPI(endpoint, retried = false) {
                const controller = new AbortController();
                const tid = setTimeout(() => controller.abort(), 8000);
                try {
                    const headers = {};
                    if (this.jwtToken) headers['Authorization'] = `Bearer ${this.jwtToken}`;
                    const res = await fetch(this.PRIMARY + endpoint, { headers, signal: controller.signal });
                    clearTimeout(tid);
                    if (res.status === 401 && !retried) {
                        await this.reAuthenticate();
                        return this.fetchAPI(endpoint, true);
                    }
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return res.json();
                } catch (e) {
                    clearTimeout(tid);
                    throw e;
                }
            },

            // ── Re-authenticate (get JWT) ──
            async reAuthenticate() {
                try {
                    const res = await fetch(this.PRIMARY + '/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            name: 'WC26MapApp',
                            email: `wc26map_${Date.now()}@app.local`,
                            password: 'WC26Map!2026'
                        })
                    });
                    const data = await res.json();
                    if (data.token) this.jwtToken = data.token;
                } catch(e) { /* silent */ }
            },

            // ── Build standings from joined teams + groups API data ──
            buildStandings(teamsArr, groupsArr) {
                // Build team lookup by id
                const teamById = {};
                teamsArr.forEach(t => {
                    const iso2 = ISO_OVERRIDE[t.iso2] || t.iso2.toLowerCase();
                    const apiName = t.name_en;
                    const displayName = DISPLAY_NAME_OVERRIDES[apiName] || apiName;
                    const mapName = API_TO_MAP_NAME[apiName] || apiName;
                    teamById[t.id] = { name: displayName, mapName, iso: iso2, flag: t.flag, apiName };
                });

                // Build group standings
                const standings = groupsArr.map(g => {
                    const letter = g.name;
                    const color = GROUP_COLORS[letter] || '#888';
                    const teams = g.teams
                        .map(entry => {
                            const t = teamById[entry.team_id];
                            if (!t) return null;
                            const team = {
                                name: t.name,
                                mapName: t.mapName,
                                iso: t.iso,
                                flag: t.flag,
                                gp: parseInt(entry.mp) || 0,
                                w:  parseInt(entry.w)  || 0,
                                d:  parseInt(entry.d)  || 0,
                                l:  parseInt(entry.l)  || 0,
                                gd: parseInt(entry.gd) || 0,
                                pts: parseInt(entry.pts) || 0
                            };
                            // Apply hardcoded corrections (fixes bad API iso2 / mapName values)
                            const hc = TEAM_HARDCODES[team.name];
                            if (hc) {
                                if (hc.iso)     team.iso     = hc.iso;
                                if (hc.mapName) team.mapName = hc.mapName;
                            }
                            return team;
                        })
                        .filter(Boolean)
                        .sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gp - a.gp);

                    return { group: `Group ${letter}`, color, teams };
                });

                return standings.sort((a, b) => {
                    const la = a.group.replace('Group ', '');
                    const lb = b.group.replace('Group ', '');
                    return la.localeCompare(lb);
                });
            },

            // ── Build matches lookup from games array ──
            buildMatches(gamesArr) {
                const matches = {};
                const now = new Date();
                // For each team, find their next upcoming match
                const upcoming = gamesArr
                    .filter(g => g.finished !== 'TRUE' && g.time_elapsed !== 'finished')
                    .sort((a, b) => new Date(a.local_date) - new Date(b.local_date));

                upcoming.forEach(g => {
                    const hName = g.home_team_name_en;
                    const aName = g.away_team_name_en;
                    if (!hName || !aName) return;
                    const hDisplay = DISPLAY_NAME_OVERRIDES[hName] || hName;
                    const aDisplay = DISPLAY_NAME_OVERRIDES[aName] || aName;
                    const hIso = (ISO_OVERRIDE[g.home_team_iso2] || (g.home_team_iso2 || '').toLowerCase());
                    const aIso = (ISO_OVERRIDE[g.away_team_iso2] || (g.away_team_iso2 || '').toLowerCase());
                    const dateStr = g.local_date ? g.local_date.split(' ')[0] : '';
                    const timeStr = g.local_date ? g.local_date.split(' ')[1] : '';
                    if (!matches[hDisplay]) {
                        matches[hDisplay] = { opponent: aDisplay, flag: `https://flagcdn.com/w40/${getAlpha2(aIso)}.png`, date: dateStr, time: timeStr, isFlagUrl: true };
                    }
                    if (!matches[aDisplay]) {
                        matches[aDisplay] = { opponent: hDisplay, flag: `https://flagcdn.com/w40/${getAlpha2(hIso)}.png`, date: dateStr, time: timeStr, isFlagUrl: true };
                    }
                });
                matches['def'] = { opponent: 'TBD', flag: '🏳️', date: 'TBD', time: '' };
                return matches;
            },

            // ── Check if any game is live; schedule appropriate refresh ──
            checkLiveAndSchedule(gamesArr) {
                const hasLive = gamesArr.some(g =>
                    g.time_elapsed === 'live' ||
                    g.time_elapsed === 'halftime' ||
                    (g.finished !== 'TRUE' && g.finished !== 'FALSE' && g.time_elapsed)
                );
                const indicator = document.getElementById('live-indicator');
                if (hasLive) {
                    this.isLive = true;
                    if (indicator) indicator.classList.add('visible');
                } else {
                    this.isLive = false;
                    if (indicator) indicator.classList.remove('visible');
                }
                clearTimeout(this.refreshTimer);
                const interval = hasLive ? this.LIVE_POLL_MS : this.REFRESH_INTERVAL_MS;
                this.refreshTimer = setTimeout(() => this.refresh(), interval);
            },

            // ── In-place update of standings rows without full re-render ──
            updateStandingsRows(newStandings) {
                newStandings.forEach(groupData => {
                    groupData.teams.forEach(team => {
                        const rowId = `row-${team.name.replace(/\s+/g, '')}`;
                        const row = document.getElementById(rowId);
                        if (!row) return;
                        const cells = row.querySelectorAll('.stat-cell, .gd-cell, .pts-cell');
                        // cells order: GP, W, D, L, GD, PTS
                        const vals = [team.gp, team.w, team.d, team.l, team.gd, team.pts];
                        cells.forEach((cell, i) => {
                            const newVal = String(vals[i]);
                            if (cell.textContent !== newVal) {
                                cell.textContent = newVal;
                                // Brief flash to signal update
                                cell.style.transition = 'none';
                                cell.style.color = 'var(--ios-blue)';
                                setTimeout(() => {
                                    cell.style.transition = 'color 1s ease';
                                    cell.style.color = '';
                                }, 50);
                            }
                        });
                    });
                });
            },

            // ── Background refresh (runs every 10min or 60s if live) ──
            async refresh() {
                try {
                    const [groupsData, gamesData] = await Promise.all([
                        this.fetchAPI('/get/groups'),
                        this.fetchAPI('/get/games')
                    ]);
                    // Rebuild standings with current teamsArr cached from init
                    if (this._teamsArr) {
                        const newStandings = this.buildStandings(this._teamsArr, groupsData.groups);
                        mockData.standings = newStandings;
                        this.updateStandingsRows(newStandings);
                    }
                    if (gamesData && gamesData.games) {
                        mockData.allGames = gamesData.games;
                        mockData.matches = this.buildMatches(gamesData.games);
                        buildKnockoutMatches(gamesData.games);
                        refreshBracketIfVisible();
                        extractTeamsFromGames(gamesData.games);
                        this.checkLiveAndSchedule(gamesData.games);
                    } else {
                        this.checkLiveAndSchedule([]);
                    }
                    if (typeof topoData !== 'undefined' && topoData) {
                        g.selectAll('.country').attr('class', d => getCountryClasses(d.properties.name));
                    }
                } catch (e) {
                    // Silently reschedule
                    clearTimeout(this.refreshTimer);
                    this.refreshTimer = setTimeout(() => this.refresh(), this.REFRESH_INTERVAL_MS);
                }
            },

            // ── Fallback: parse openfootball JSON into standings ──
            async loadFallback() {
                try {
                    const res = await fetch(this.FALLBACK);
                    const data = await res.json();
                    // openfootball doesn't have standings, so we compute from match scores
                    const table = {}; // { teamName: { mp,w,d,l,gf,ga } }
                    const groupMap = {}; // { teamName: groupLetter }

                    if (data.matches) {
                        mockData.allGames = data.matches;
                        extractTeamsFromFallbackGames(data.matches);
                        data.matches.forEach(m => {
                            if (!m.score || !m.group) return;
                            const grp = m.group.replace('Group ', '');
                            const h = m.team1, a = m.team2;
                            const hg = m.score.ft[0], ag = m.score.ft[1];
                            groupMap[h] = grp; groupMap[a] = grp;
                            if (!table[h]) table[h] = {mp:0,w:0,d:0,l:0,gf:0,ga:0};
                            if (!table[a]) table[a] = {mp:0,w:0,d:0,l:0,gf:0,ga:0};
                            table[h].mp++; table[a].mp++;
                            table[h].gf += hg; table[h].ga += ag;
                            table[a].gf += ag; table[a].ga += hg;
                            if (hg > ag) { table[h].w++; table[a].l++; }
                            else if (hg < ag) { table[a].w++; table[h].l++; }
                            else { table[h].d++; table[a].d++; }
                        });
                    }

                    // Map openfootball team names → our display names
                    const OF_NAME_MAP = {
                        'South Korea': 'Korea Republic', 'Czech Republic': 'Czechia',
                        'United States': 'USA', 'USA': 'USA', 'Bosnia & Herzegovina': 'Bosnia and Herzegovina',
                        'Ivory Coast': "Côte d'Ivoire", 'Turkey': 'Türkiye',
                        'DR Congo': 'Congo DR', 'Iran': 'Iran', 'Cape Verde': 'Cabo Verde'
                    };
                    const OF_ISO_MAP = {
                        'Mexico':'mx','South Africa':'za','South Korea':'kr','Czech Republic':'cz',
                        'Canada':'ca','Bosnia & Herzegovina':'ba','Qatar':'qa','Switzerland':'ch',
                        'Brazil':'br','Morocco':'ma','Haiti':'ht','Scotland':'gb-sct',
                        'United States':'us','USA':'us','Paraguay':'py','Australia':'au','Turkey':'tr',
                        'Germany':'de','Curaçao':'cw','Ivory Coast':'ci','Ecuador':'ec',
                        'Netherlands':'nl','Japan':'jp','Sweden':'se','Tunisia':'tn',
                        'Belgium':'be','Egypt':'eg','Iran':'ir','New Zealand':'nz',
                        'Spain':'es','Cape Verde':'cv','Saudi Arabia':'sa','Uruguay':'uy',
                        'France':'fr','Senegal':'sn','Iraq':'iq','Norway':'no',
                        'Argentina':'ar','Algeria':'dz','Austria':'at','Jordan':'jo',
                        'Portugal':'pt','DR Congo':'cd','Uzbekistan':'uz','Colombia':'co',
                        'England':'gb-eng','Croatia':'hr','Ghana':'gh','Panama':'pa'
                    };
                    const OF_MAPNAME = {
                        'United States':'United States of America','USA':'United States of America','Czech Republic':'Czechia',
                        'South Korea':'South Korea','Ivory Coast':'Ivory Coast',
                        'DR Congo':'Democratic Republic of the Congo','Cape Verde':'Cabo Verde',
                        'Iran':'Iran','Turkey':'Turkey'
                    };

                    // Group by letter
                    const byGroup = {};
                    Object.entries(groupMap).forEach(([tname, grp]) => {
                        if (!byGroup[grp]) byGroup[grp] = [];
                        const s = table[tname] || {mp:0,w:0,d:0,l:0,gf:0,ga:0};
                        const displayName = OF_NAME_MAP[tname] || tname;
                        const mapName = OF_MAPNAME[tname] || tname;
                        const iso = OF_ISO_MAP[tname] || 'un';
                        byGroup[grp].push({
                            name: displayName, mapName, iso,
                            flag: `https://flagcdn.com/w40/${getAlpha2(iso)}.png`,
                            gp: s.mp, w: s.w, d: s.d, l: s.l,
                            gd: s.gf - s.ga, pts: s.w * 3 + s.d
                        });
                    });

                    // Fill missing teams with zero stats
                    const SEED = [
                        {l:'A',teams:['Mexico','South Africa','South Korea','Czech Republic']},
                        {l:'B',teams:['Canada','Bosnia & Herzegovina','Qatar','Switzerland']},
                        {l:'C',teams:['Brazil','Morocco','Haiti','Scotland']},
                        {l:'D',teams:['United States','Paraguay','Australia','Turkey']},
                        {l:'E',teams:['Germany','Curaçao','Ivory Coast','Ecuador']},
                        {l:'F',teams:['Netherlands','Japan','Sweden','Tunisia']},
                        {l:'G',teams:['Belgium','Egypt','Iran','New Zealand']},
                        {l:'H',teams:['Spain','Cape Verde','Saudi Arabia','Uruguay']},
                        {l:'I',teams:['France','Senegal','Iraq','Norway']},
                        {l:'J',teams:['Argentina','Algeria','Austria','Jordan']},
                        {l:'K',teams:['Portugal','DR Congo','Uzbekistan','Colombia']},
                        {l:'L',teams:['England','Croatia','Ghana','Panama']}
                    ];
                    SEED.forEach(({l, teams}) => {
                        if (!byGroup[l]) byGroup[l] = [];
                        teams.forEach(tname => {
                            if (!byGroup[l].find(t => t.name === (OF_NAME_MAP[tname] || tname))) {
                                const displayName = OF_NAME_MAP[tname] || tname;
                                const mapName = OF_MAPNAME[tname] || tname;
                                const iso = OF_ISO_MAP[tname] || 'un';
                                byGroup[l].push({name: displayName, mapName, iso, flag: `https://flagcdn.com/w40/${getAlpha2(iso)}.png`, gp:0,w:0,d:0,l:0,gd:0,pts:0});
                            }
                        });
                    });

                    const standings = Object.entries(byGroup)
                        .sort(([a],[b]) => a.localeCompare(b))
                        .map(([letter, teams]) => ({
                            group: `Group ${letter}`,
                            color: GROUP_COLORS[letter] || '#888',
                            teams: teams.sort((a,b) => b.pts - a.pts || b.gd - a.gd)
                        }));

                    mockData.standings = standings;
                    document.getElementById('standings-content').innerHTML = '';
                    renderStandingsDock(standings);

                    if (typeof topoData !== 'undefined' && topoData) {
                        g.selectAll('.country').attr('class', d => getCountryClasses(d.properties.name));
                        g.selectAll('.country-label').attr('class', d => "country-label " + getCountryClasses(d.properties.name));
                    }
                } catch(e) {
                    // Both APIs failed — use whatever static data we already have
                    console.warn('[WC26] All data sources failed, using cached data');
                }
            },

            // ── Entry point ──
            async init() {
                try {
                    const [teamsData, groupsData, gamesData] = await Promise.all([
                        this.fetchAPI('/get/teams'),
                        this.fetchAPI('/get/groups'),
                        this.fetchAPI('/get/games')
                    ]);

                    this._teamsArr = teamsData.teams;
                    buildTeamIsoLookup(teamsData.teams);
                    const standings = this.buildStandings(teamsData.teams, groupsData.groups);
                    mockData.standings = standings;

                    if (gamesData && gamesData.games) {
                        mockData.allGames = gamesData.games;
                        mockData.matches = this.buildMatches(gamesData.games);
                        buildKnockoutMatches(gamesData.games);
                        refreshBracketIfVisible();
                        extractTeamsFromGames(gamesData.games);
                        this.checkLiveAndSchedule(gamesData.games);
                    } else {
                        this.checkLiveAndSchedule([]);
                    }

                    // Re-render the dock with live data
                    document.getElementById('standings-content').innerHTML = '';
                    renderStandingsDock(standings);

                    // Also re-render the map participating countries
                    // (in case map loaded before this resolves, update country classes)
                    if (typeof topoData !== 'undefined' && topoData) {
                        g.selectAll('.country').attr('class', d => getCountryClasses(d.properties.name));
                        g.selectAll('.country-label').attr('class', d => "country-label " + getCountryClasses(d.properties.name));
                    }

                } catch(e) {
                    // Primary API failed — try fallback
                    console.error('[WC26] init() API failed:', e);
                    this.loadFallback();
                    // Schedule a retry in 5 minutes
                    this.refreshTimer = setTimeout(() => this.init(), 5 * 60 * 1000);
                }
            }
        };

        // Legacy matches reference (kept for openCountryDetail compatibility)
        const mockData_matches_legacy = {
            "Mexico": { opponent: "Poland", flag: "🇵🇱", date: "June 25", time: "3:00 PM PST" },
            "def": { opponent: "TBD", flag: "🏳️", date: "TBD", time: "" }
        };

        function getRankOrdinal(rank) {
            const ords = ["th", "st", "nd", "rd"];
            const v = rank % 100;
            return rank + (ords[(v - 20) % 10] || ords[v] || ords[0]);
        }

        // --- MAP SETUP ---
        const mapCanvas = d3.select("#map-canvas");
        svg = mapCanvas.append("svg");
        g = svg.append("g");
        const tooltip = d3.select("#map-tooltip");

        const projection = d3.geoNaturalEarth1()
            .scale(Math.min(window.innerWidth, window.innerHeight) * 0.50)
            .translate([window.innerWidth * 0.485, (window.innerHeight - 240) / 2])
            .rotate([11, 0]);

        const path = d3.geoPath()
            .projection(projection);

        zoom = d3.zoom()
            .scaleExtent([1, 8])
            .translateExtent([[-window.innerWidth * 0.2, -window.innerHeight * 0.2], [window.innerWidth * 1.2, window.innerHeight * 1.2]])
            .on("zoom", zoomed);

        svg.call(zoom);

        function zoomed(event) {
            g.attr("transform", event.transform);
            
            const k = event.transform.k;
            g.selectAll(".country-label")
                .style("font-size", `${10 / k}px`) 
                .style("opacity", k > 1.4 ? 1 : 0); 
        }

        let topoData; 
        let activeCountryId = null;

        Promise.all([
            d3.json("world-subunits.json")
        ]).then(([geoData]) => {
            topoData = geoData;
            renderMap();
            // Render dock with pre-seeded data immediately (API will update stats)
            renderStandingsDock();
            buildKnockoutMatches([]);
            LiveDataService.init();
        });

        // Sets of teams in different rounds
        const teamsInStage = {
            r32: new Set(),
            r16: new Set(),
            qf: new Set(),
            sf: new Set(),
            final: new Set()
        };

        function extractTeamsFromGames(gamesArr) {
            teamsInStage.r32.clear();
            teamsInStage.r16.clear();
            teamsInStage.qf.clear();
            teamsInStage.sf.clear();
            teamsInStage.final.clear();
            
            if (!gamesArr) return;
            
            gamesArr.forEach(g => {
                const type = (g.type || '').toLowerCase();
                const hName = g.home_team_name_en;
                const aName = g.away_team_name_en;
                if (!hName || !aName) return;
                
                const hDisplay = DISPLAY_NAME_OVERRIDES[hName] || hName;
                const aDisplay = DISPLAY_NAME_OVERRIDES[aName] || aName;
                
                if (type === 'r32') {
                    teamsInStage.r32.add(hDisplay);
                    teamsInStage.r32.add(aDisplay);
                } else if (type === 'r16') {
                    teamsInStage.r16.add(hDisplay);
                    teamsInStage.r16.add(aDisplay);
                } else if (type === 'qf') {
                    teamsInStage.qf.add(hDisplay);
                    teamsInStage.qf.add(aDisplay);
                } else if (type === 'sf') {
                    teamsInStage.sf.add(hDisplay);
                    teamsInStage.sf.add(aDisplay);
                } else if (type === 'final') {
                    teamsInStage.final.add(hDisplay);
                    teamsInStage.final.add(aDisplay);
                }
            });
        }

        function extractTeamsFromFallbackGames(matchesArr) {
            teamsInStage.r32.clear();
            teamsInStage.r16.clear();
            teamsInStage.qf.clear();
            teamsInStage.sf.clear();
            teamsInStage.final.clear();
            
            if (!matchesArr) return;
            
            matchesArr.forEach(m => {
                const round = (m.round || m.group || '').toLowerCase();
                const hName = m.team1;
                const aName = m.team2;
                if (!hName || !aName) return;
                
                const OF_NAME_MAP = {
                    'South Korea': 'Korea Republic', 'Czech Republic': 'Czechia',
                    'United States': 'USA', 'USA': 'USA', 'Bosnia & Herzegovina': 'Bosnia and Herzegovina',
                    'Ivory Coast': "Côte d'Ivoire", 'Turkey': 'Türkiye',
                    'DR Congo': 'Congo DR', 'Iran': 'Iran', 'Cape Verde': 'Cabo Verde'
                };
                
                const hDisplay = OF_NAME_MAP[hName] || hName;
                const aDisplay = OF_NAME_MAP[aName] || aName;
                
                if (round.includes('32') || round.includes('round of 32')) {
                    teamsInStage.r32.add(hDisplay);
                    teamsInStage.r32.add(aDisplay);
                } else if (round.includes('16') || round.includes('round of 16')) {
                    teamsInStage.r16.add(hDisplay);
                    teamsInStage.r16.add(aDisplay);
                } else if (round.includes('quarter') || round.includes('qf')) {
                    teamsInStage.qf.add(hDisplay);
                    teamsInStage.qf.add(aDisplay);
                } else if (round.includes('semi') || round.includes('sf')) {
                    teamsInStage.sf.add(hDisplay);
                    teamsInStage.sf.add(aDisplay);
                } else if (round.includes('final')) {
                    teamsInStage.final.add(hDisplay);
                    teamsInStage.final.add(aDisplay);
                }
            });
        }

        function getCountryClasses(countryName) {
            const isParticipating = findTeamStandingsData(countryName) !== null;
            if (!isParticipating) return "country";
            
            let classes = ["country", "participating"];
            const countryData = findTeamStandingsData(countryName);
            if (countryData && countryData.team) {
                const displayName = countryData.team.name;
                const mapName = countryData.team.mapName;
                
                const isInStage = (stageKey) => {
                    return teamsInStage[stageKey].has(displayName) || 
                           teamsInStage[stageKey].has(mapName) || 
                           teamsInStage[stageKey].has(countryName);
                };

                if (isInStage('r32')) classes.push("r32-team");
                if (isInStage('r16')) classes.push("r16-team");
                if (isInStage('qf')) classes.push("qf-team");
                if (isInStage('sf')) classes.push("sf-team");
                if (isInStage('final')) classes.push("final-team");
            }
            return classes.join(" ");
        }

        function renderMap() {
            g.selectAll(".country")
                .data(topoData.features)
                .enter().append("path")
                .attr("class", d => getCountryClasses(d.properties.name))
                .attr("d", path)
                .on("mouseover", showTooltip)
                .on("mousemove", moveTooltip)
                .on("mouseout", hideTooltip)
                .on("click", countryClick);
                
            g.selectAll(".country-label")
                .data(topoData.features.filter(d => findTeamStandingsData(d.properties.name) !== null))
                .enter().append("text")
                .attr("class", "country-label")
                .attr("transform", d => {
                    if (d.properties.name === "France") {
                        const proj = projection([2.21, 46.22]);
                        return `translate(${proj[0]},${proj[1]})`;
                    }
                    const centroid = path.centroid(d);
                    if (isNaN(centroid[0]) || isNaN(centroid[1])) return "translate(-9999,-9999)";
                    return `translate(${centroid[0]},${centroid[1]})`;
                })
                .attr("dy", ".35em")
                .text(d => d.properties.name);
        }

        // --- INTERACTION FUNCTIONS ---

        function showTooltip(event, d) {
            const countryName = d.properties.name;
            const countryData = findTeamStandingsData(countryName);

            if (countryData) {
                tooltip.style("opacity", 1);
                tooltip.html(`
                    <img src="https://flagcdn.com/w40/${getAlpha2(countryData.team.iso)}.png" class="flag-rect" style="width: 20px; height: 14px; margin: 0; border-radius: 2px;">
                    <span>${countryData.team.name} (${getRankOrdinal(countryData.rank)} in ${countryData.groupName})</span>
                `);
            } else {
                tooltip.style("opacity", 0);
            }
        }

        function moveTooltip(event) {
            tooltip
                .style("left", (event.pageX + 10) + "px")
                .style("top", (event.pageY + 10) + "px");
        }

        function hideTooltip() {
            tooltip.style("opacity", 0);
        }
        
        window.zoomToCountryByName = function(name) {
            const countryNode = d3.selectAll(".country").filter(d => {
                if (!d) return false;
                const cData = findTeamStandingsData(name, true);
                if (!cData) return false;
                return d.properties.name === cData.team.mapName || d.properties.name === name;
            }).node();
            
            if (countryNode) {
                const d = d3.select(countryNode).datum();
                countryClick(null, d, d3.select(countryNode), name);
            }
        };

        // (Moved _currentStage declaration to top of script)

        const ALL_QUALIFIED_COUNTRIES = [];
        // Pre-compute qualified countries
        function getAllQualifiedCountries() {
            if (ALL_QUALIFIED_COUNTRIES.length > 0) return ALL_QUALIFIED_COUNTRIES;
            mockData.standings.forEach(grp => grp.teams.forEach(t => {
                ALL_QUALIFIED_COUNTRIES.push(t.mapName);
                ALL_QUALIFIED_COUNTRIES.push(t.name);
            }));
            return ALL_QUALIFIED_COUNTRIES;
        }

        function getTeamMapName(teamName) {
            if (!teamName) return null;
            
            // Normalize variants
            let normalized = teamName;
            if (teamName === "Congo DR" || teamName === "DR Congo" || teamName === "Democratic Republic of the Congo") {
                normalized = "Congo DR";
            } else if (teamName === "Cabo Verde" || teamName === "Cape Verde") {
                normalized = "Cabo Verde";
            } else if (teamName === "United States" || teamName === "United States of America" || teamName === "USA") {
                normalized = "USA";
            } else if (teamName === "Bosnia & Herzegovina" || teamName === "Bosnia and Herzegovina") {
                normalized = "Bosnia and Herzegovina";
            }
            
            let mapNameResult = normalized;
            let found = false;
            for (const grp of mockData.standings) {
                for (const team of grp.teams) {
                    if (team.name === normalized || team.mapName === normalized) {
                        mapNameResult = team.mapName;
                        found = true;
                        break;
                    }
                }
                if (found) break;
            }
            
            // Dev-mode console warning if map name fails to find a matching region in GeoJSON
            if (typeof topoData !== 'undefined' && topoData && topoData.features) {
                const mapGeoNames = new Set(topoData.features.map(f => f.properties.name));
                if (!mapGeoNames.has(mapNameResult)) {
                    console.warn(`[Map Warning] Country "${teamName}" (mapped to "${mapNameResult}") failed to find a matching region in world-subunits.json!`);
                }
            }
            
            return mapNameResult;
        }

        window.applySelectionDimming = function(countryName) {
            window.selectedCountry = countryName;
            
            if (countryName) {
                // Dim other columns/cards
                d3.selectAll(".bracket-col").each(function() {
                    const col = this;
                    let hasSelectedCountry = false;
                    
                    d3.select(col).selectAll(".match-card").each(function() {
                        const card = d3.select(this);
                        const home = card.attr("data-home");
                        const away = card.attr("data-away");
                        if (home === countryName || away === countryName) {
                            hasSelectedCountry = true;
                            card.classed("dimmed", false);
                        } else {
                            card.classed("dimmed", true);
                        }
                    });
                    
                    if (hasSelectedCountry) {
                        d3.select(col).classed("dimmed", false);
                    } else {
                        d3.select(col).classed("dimmed", true);
                    }
                });
                
                // Dim other team rows inside the active cards
                d3.selectAll(".match-card-team").each(function() {
                    const teamRow = d3.select(this);
                    const teamName = teamRow.attr("data-team-name");
                    if (teamName === countryName) {
                        teamRow.classed("dimmed", false);
                    } else {
                        teamRow.classed("dimmed", true);
                    }
                });
                
                // Dim other country rows in standings
                d3.selectAll(".table-row").each(function() {
                    const row = d3.select(this);
                    if (row.classed("no-hover")) return;
                    
                    let isCurrent = false;
                    row.selectAll(".country-name-cell").each(function() {
                        if (d3.select(this).text() === countryName) isCurrent = true;
                    });
                    
                    if (isCurrent) {
                        row.classed("dimmed", false);
                    } else {
                        row.classed("dimmed", true);
                    }
                });
            } else {
                // Clear dimming on everything
                d3.selectAll(".bracket-col, .match-card, .match-card-team, .main-canvas, .table-row").classed("dimmed", false);
            }
        };

        function getActiveCountriesForStage(stage) {
            if (stage === 'qualified') return new Set(getAllQualifiedCountries());
            // read from existing bracket round data and return a Set of country IDs
            const stageKey = { r32: 'r32', r16: 'r16', qf: 'qf', sf: 'sf', final: 'final' }[stage];
            const matches = (stageKey && mockData.knockoutMatches[stageKey]) || [];
            const s = new Set();
            matches.forEach(m => {
                if (m.home && m.home.name) {
                    const mapName = getTeamMapName(m.home.name);
                    if (mapName) s.add(mapName);
                    s.add(m.home.name);
                }
                if (m.away && m.away.name) {
                    const mapName = getTeamMapName(m.away.name);
                    if (mapName) s.add(mapName);
                    s.add(m.away.name);
                }
            });
            if (stageKey && teamsInStage[stageKey]) {
                teamsInStage[stageKey].forEach(name => {
                    const mapName = getTeamMapName(name);
                    if (mapName) s.add(mapName);
                    s.add(name);
                });
            }
            return s;
        }

        function countryClick(event, d, countryElement, specificTeamName = null) {
            console.log("Map Click: countryId =", d.properties.name, specificTeamName);
            if (event && event.stopPropagation) event.stopPropagation();

            const countryId = d.properties.name;
            const active = getActiveCountriesForStage(_currentStage);
            if (!active.has(countryId)) return;

            const mapName = d.properties.name;
            const countryData = specificTeamName ? findTeamStandingsData(specificTeamName, true) : findTeamStandingsData(mapName);

            if (countryData) {
                const element = countryElement || d3.select(this);
                setActiveCountry(element, d);
                openCountryDetail(countryData.team.name, countryData);
                highlightStandingsRow(countryData.team.name);
                openTimeline(countryData.team.name);
                
                const bounds = path.bounds(d);
                const dx = bounds[1][0] - bounds[0][0];
                const dy = bounds[1][1] - bounds[0][1];
                const x = (bounds[0][0] + bounds[1][0]) / 2;
                const y = (bounds[0][1] + bounds[1][1]) / 2;
                
                const scale = Math.max(1.5, Math.min(5, 0.20 / Math.max(dx / window.innerWidth, dy / window.innerHeight)));
                const targetX = window.innerWidth / 4;
                const targetY = (window.innerHeight - 240) / 2;

                const translate = [targetX - scale * x, targetY - scale * y];

                svg.transition()
                    .duration(750)
                    .call(zoom.transform, d3.zoomIdentity.translate(translate[0], translate[1]).scale(scale));
            } else {
                clearSelections();
            }
        }

        function setActiveCountry(element, d) {
            clearSelections();
            element.classed("active", true);
            activeCountryId = d.id;
            d3.select(".main-canvas").classed("map-has-selection", true);
        }

        function clearSelections() {
            if (g) g.selectAll(".country").classed("active", false);
            activeCountryId = null;
            d3.select(".main-canvas").classed("map-has-selection", false);
            closePanels();
            d3.selectAll(".table-row").classed("highlight", false);
            resetZoom();
        }

        function resetZoom() {
            if (svg && zoom) {
                svg.transition()
                    .duration(750)
                    .call(zoom.transform, d3.zoomIdentity);
            }
        }

        // --- STANDINGS RENDERING (BOTTOM DOCK) ---

        function renderStandingsDock(standings) {
            const standingsData = standings || mockData.standings;
            const standingsContent = d3.select("#standings-content");

            standingsData.forEach(groupGroup => {
                const groupCard = standingsContent.append("div")
                    .attr("class", "group-card")
                    .style("--group-color", groupGroup.color)
                    .style("--card-tint-start", groupGroup.color + "4D")
                    .style("--card-tint-end", groupGroup.color + "05");

                const table = groupCard.append("div")
                    .attr("class", "standings-table");

                const headerRow = table.append("div").attr("class", "table-row no-hover");

                headerRow.append("span")
